<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRUTFOX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#crosshair { position: fixed; pointer-events: none; z-index: 10; }
#crosshair-ring { width: 24px; height: 24px; border: 1.5px solid rgba(255,255,255,0.6); border-radius: 50%; position: absolute; top: -12px; left: -12px; transition: border-color 0.1s; }
#crosshair-dot { width: 3px; height: 3px; background: rgba(255,255,255,0.8); border-radius: 50%; position: absolute; top: -1.5px; left: -1.5px; }
#crosshair.hostile #crosshair-ring { border-color: rgba(230,57,136,0.9); }
#crosshair.hostile #crosshair-dot { background: rgba(230,57,136,0.9); }
#score { position: fixed; top: 16px; left: 16px; color: #fff; font-family: 'Courier New', monospace; font-size: 18px; z-index: 10; pointer-events: none; opacity: 0.8; }
#shard-count { position: fixed; top: 40px; left: 16px; color: #FFBE0B; font-family: 'Courier New', monospace; font-size: 14px; z-index: 10; pointer-events: none; opacity: 0.8; }
#hp-display { position: fixed; top: 16px; right: 16px; color: #fff; font-family: 'Courier New', monospace; font-size: 18px; z-index: 10; pointer-events: none; opacity: 0.8; }
#boss-hp-bar { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); width: 300px; height: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3); z-index: 10; pointer-events: none; display: none; }
#boss-hp-fill { width: 100%; height: 100%; background: #E63988; transition: width 0.2s; }
#game-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 20; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; flex-direction: column; cursor: pointer; }
#game-over h1 { color: #E63988; font-family: 'Courier New', monospace; font-size: 48px; letter-spacing: 8px; }
#game-over p { color: rgba(255,255,255,0.6); font-family: 'Courier New', monospace; font-size: 14px; margin-top: 16px; }
#damage-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(230,57,136,0.3); pointer-events: none; z-index: 15; opacity: 0; }
#boss-death-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; pointer-events: none; z-index: 15; opacity: 0; }
</style>
</head>
<body>
<div id="crosshair"><div id="crosshair-ring"></div><div id="crosshair-dot"></div></div>
<div id="score">0</div>
<div id="shard-count">0 SHARDS</div>
<div id="hp-display">HP: 3</div>
<div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
<div id="game-over"><h1>GAME OVER</h1><p>CLICK TO RESTART</p></div>
<div id="damage-flash"></div>
<div id="boss-death-flash"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// CONSTANTS & CONFIG
// ============================================================
const COLORS = {
    SKY_TOP: 0x1A535C,
    SKY_HORIZON: 0xFFB4A2,
    CONCRETE: 0xC4A882,
    COOL_CONCRETE: 0x8B8D8E,
    DUSTY_ROSE: 0xC48A7A,
    TERRACOTTA: 0xB85C3A,
    CORAL: 0xE07A5F,
    DUSTY_BLUE: 0x5B8BA0,
    SAGE: 0x81B29A,
    SHIP_BODY: 0xE8E0D4,
    SHIP_WING: 0x3A3A3A,
    SHIP_ACCENT: 0xE07A5F,
    LIGHT_WARM: 0xFFD699,
    LIGHT_AMBIENT: 0x6B5B95,
    FOG: 0xFFB4A2,
    LASER: 0xFFD166,
    CURRENCY: 0xFFBE0B
};

const FLIGHT = {
    BASE_SPEED: 30,
    BOOST_MULTIPLIER: 1.5,
    BASE_FOV: 65,
    BOOST_FOV: 72,
    BOOST_RECHARGE_TIME: 3.0
};

const CONTROLS = {
    LERP_FACTOR: 0.08,
    BANK_ANGLE: Math.PI / 12,
    ROLL_DURATION: 0.4,
    ROLL_COOLDOWN: 1.5,
    DOUBLE_TAP_WINDOW: 0.3,
    GAMEPAD_DEADZONE: 0.15
};

const CAM = {
    BEHIND: 8,
    ABOVE: 3,
    LERP: 0.05
};

const BOUNDS = {
    MOVE_X: 12,
    MOVE_Y: 8
};

// ============================================================
// GAME STATE
// ============================================================
let scene, camera, renderer, clock;
let splineCurve, splineLength, splineProgress = 0;
let shipGroup;
let debugLine = null, debugVisible = false;

const shipOffset = new THREE.Vector2(0, 0);
const targetOffset = new THREE.Vector2(0, 0);

let currentSpeed = FLIGHT.BASE_SPEED;
let boostMeter = 1.0;
let isBoosting = false;

const barrelRoll = {
    active: false,
    progress: 0,
    direction: 0,
    cooldownTimer: 0
};

const input = {
    keys: {},
    mouseNormX: 0,
    mouseNormY: 0,
    gamepadIndex: -1,
    lastTapA: 0,
    lastTapD: 0,
    useGamepad: false
};

let gameState = 'PLAYING';
let elapsedTime = 0;

// Speed lines pool
let speedLines = [];
const SPEED_LINE_COUNT = 50;

// ============================================================
// COMBAT STATE
// ============================================================
const COMBAT = {
    FIRE_RATE: 6,             // rounds per second
    PROJ_SPEED: 80,
    PROJ_MAX_DIST: 150,
    PROJ_POOL_SIZE: 50,
    ENEMY_PROJ_SPEED: 25,
    ENEMY_PROJ_POOL: 30,
    ENEMY_PROJ_MAX_DIST: 200,
    ENEMY_PROJ_MAX_TIME: 8,
    DRONE_HP: 1,
    DRONE_HITBOX: 1.2,
    TURRET_HP: 3,
    TURRET_HITBOX: 1.8,
    TURRET_FIRE_INTERVAL: 3,
    TURRET_CHARGE_TIME: 1,
    PLAYER_HITBOX: 1.2,
    PLAYER_HP: 3,
    INVULN_TIME: 0.5,
    SHARD_COLLECT_RADIUS: 3,
    SHARD_POOL_SIZE: 40,
    FRAGMENT_POOL_SIZE: 80
};

let playerHP = COMBAT.PLAYER_HP;
let playerInvulnTimer = 0;
let playerDamageFlashTimer = 0;
let cameraShakeTimer = 0;
let cameraShakeIntensity = 0;
let fireTimer = 0;
let isFireHeld = false;
let score = 0;
let shardCount = 0;
let lastSpawnIndex = -1;

// Object pools
const playerProjectiles = [];
const enemyProjectiles = [];
const drones = [];
const turrets = [];
const shards = [];
const fragments = [];

// Raycaster for aiming
const aimRaycaster = new THREE.Raycaster();
const aimNDC = new THREE.Vector2();
const aimPoint = new THREE.Vector3();

// Ship original materials (for damage flash)
let shipOriginalMats = [];

// Stored reference to main directional light
let mainDirLight = null;

// Temp vectors for calculations
const _tempVec = new THREE.Vector3();
const _tempVec2 = new THREE.Vector3();
const _tempVec3 = new THREE.Vector3();
const _slVec = new THREE.Vector3(); // dedicated for speed lines
const _worldUp = new THREE.Vector3(0, 1, 0);

// ============================================================
// INITIALIZATION
// ============================================================
function initRenderer() {
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.BasicShadowMap;
    document.body.appendChild(renderer.domElement);
}

function initScene() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(COLORS.FOG, 80, 450);
    camera = new THREE.PerspectiveCamera(FLIGHT.BASE_FOV, window.innerWidth / window.innerHeight, 0.1, 1000);
    clock = new THREE.Clock();
}

// ============================================================
// SKYBOX
// ============================================================
function createSkybox() {
    const skyGeo = new THREE.SphereGeometry(500, 32, 32);
    const skyMat = new THREE.ShaderMaterial({
        uniforms: {
            topColor: { value: new THREE.Color(COLORS.SKY_TOP) },
            horizonColor: { value: new THREE.Color(COLORS.SKY_HORIZON) }
        },
        vertexShader: `
            varying vec3 vWorldPos;
            void main() {
                vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                vWorldPos = worldPosition.xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform vec3 topColor;
            uniform vec3 horizonColor;
            varying vec3 vWorldPos;
            void main() {
                float h = normalize(vWorldPos).y;
                float t = smoothstep(-0.1, 0.5, h);
                gl_FragColor = vec4(mix(horizonColor, topColor, t), 1.0);
            }
        `,
        side: THREE.BackSide,
        depthWrite: false
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);
}

// ============================================================
// GROUND PLANE
// ============================================================
function createGround() {
    const groundGeo = new THREE.PlaneGeometry(2000, 2000);
    const groundMat = new THREE.MeshLambertMaterial({
        color: COLORS.CONCRETE,
        flatShading: true
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -18;
    ground.receiveShadow = true;
    scene.add(ground);
}

// ============================================================
// SPLINE PATH
// ============================================================
function createSplinePath() {
    const points = [
        // Straight opening run (~3 seconds at 30u/s = ~90 units)
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0, -100),
        new THREE.Vector3(0, 0, -200),
        new THREE.Vector3(0, 1, -300),

        // Gentle left curve with slight rise
        new THREE.Vector3(-30, 5, -450),
        new THREE.Vector3(-70, 10, -600),
        new THREE.Vector3(-90, 15, -780),

        // Rise upward, continuing left
        new THREE.Vector3(-80, 35, -950),
        new THREE.Vector3(-50, 50, -1100),
        new THREE.Vector3(-10, 45, -1250),

        // Bank right, descend
        new THREE.Vector3(40, 30, -1400),
        new THREE.Vector3(80, 15, -1550),
        new THREE.Vector3(60, 5, -1700),

        // Snake S-curves with elevation
        new THREE.Vector3(10, 10, -1900),
        new THREE.Vector3(-50, 20, -2100),
        new THREE.Vector3(-80, 8, -2300),
        new THREE.Vector3(-30, 15, -2500),

        // Tighter turns, varied height
        new THREE.Vector3(50, 30, -2700),
        new THREE.Vector3(100, 20, -2850),
        new THREE.Vector3(80, 5, -3050),
        new THREE.Vector3(20, 15, -3250),

        // Wide spiral opening into distance
        new THREE.Vector3(-40, 25, -3500),
        new THREE.Vector3(-100, 35, -3800),
        new THREE.Vector3(-60, 20, -4100),
        new THREE.Vector3(0, 10, -4400),
        new THREE.Vector3(50, 5, -4700),
        new THREE.Vector3(30, 0, -5000),
        new THREE.Vector3(0, 0, -5300)
    ];

    splineCurve = new THREE.CatmullRomCurve3(points, false, 'centripetal');
    splineLength = splineCurve.getLength();

    // Debug line
    const linePoints = splineCurve.getPoints(500);
    const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 });
    debugLine = new THREE.Line(lineGeo, lineMat);
    debugLine.visible = debugVisible;
    scene.add(debugLine);
}

// ============================================================
// PLAYER SHIP
// ============================================================
function createShip() {
    shipGroup = new THREE.Group();

    // Body - angular fuselage
    const bodyVerts = new Float32Array([
        // Nose
        0, 0, -2.0,
        // Top front
        -0.3, 0.2, -0.8,
        0.3, 0.2, -0.8,
        // Bottom front
        -0.3, -0.15, -0.8,
        0.3, -0.15, -0.8,
        // Top rear
        -0.4, 0.25, 1.0,
        0.4, 0.25, 1.0,
        // Bottom rear
        -0.4, -0.2, 1.0,
        0.4, -0.2, 1.0
    ]);

    const bodyIndices = [
        // Top face
        0, 1, 2,
        1, 5, 6, 1, 6, 2,
        // Bottom face
        0, 4, 3,
        3, 4, 8, 3, 8, 7,
        // Left face
        0, 3, 1,
        1, 3, 7, 1, 7, 5,
        // Right face
        0, 2, 4,
        2, 6, 8, 2, 8, 4,
        // Rear face
        5, 7, 8, 5, 8, 6
    ];

    const bodyGeo = new THREE.BufferGeometry();
    bodyGeo.setAttribute('position', new THREE.BufferAttribute(bodyVerts, 3));
    bodyGeo.setIndex(bodyIndices);
    bodyGeo.computeVertexNormals();

    const bodyMat = new THREE.MeshPhongMaterial({
        color: COLORS.SHIP_BODY,
        flatShading: true
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    shipGroup.add(body);

    // Wings - swept back
    const wingGeo = new THREE.BoxGeometry(3.0, 0.06, 1.0);
    const wingMat = new THREE.MeshPhongMaterial({
        color: COLORS.SHIP_WING,
        flatShading: true
    });

    const leftWing = new THREE.Mesh(wingGeo, wingMat);
    leftWing.position.set(-1.8, 0, 0.2);
    leftWing.rotation.z = 0.05;
    leftWing.rotation.y = 0.15;
    leftWing.castShadow = true;
    shipGroup.add(leftWing);

    const rightWing = new THREE.Mesh(wingGeo, wingMat);
    rightWing.position.set(1.8, 0, 0.2);
    rightWing.rotation.z = -0.05;
    rightWing.rotation.y = -0.15;
    rightWing.castShadow = true;
    shipGroup.add(rightWing);

    // Fin - vertical stabilizer
    const finGeo = new THREE.BoxGeometry(0.06, 0.6, 0.7);
    const finMat = new THREE.MeshPhongMaterial({
        color: COLORS.SHIP_BODY,
        flatShading: true
    });
    const fin = new THREE.Mesh(finGeo, finMat);
    fin.position.set(0, 0.45, 0.6);
    fin.castShadow = true;
    shipGroup.add(fin);

    // Accent stripe
    const stripGeo = new THREE.BoxGeometry(0.8, 0.04, 0.15);
    const stripMat = new THREE.MeshPhongMaterial({
        color: COLORS.SHIP_ACCENT,
        flatShading: true
    });
    const stripe = new THREE.Mesh(stripGeo, stripMat);
    stripe.position.set(0, 0.22, -0.3);
    shipGroup.add(stripe);

    // Engine glow
    const glowGeo = new THREE.PlaneGeometry(0.5, 0.35);
    const glowMat = new THREE.MeshBasicMaterial({
        color: 0xFF8844,
        transparent: true,
        opacity: 0.9
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.set(0, 0, 1.05);
    shipGroup.add(glow);

    scene.add(shipGroup);
}

// ============================================================
// SPEED LINES
// ============================================================
function createSpeedLines() {
    const lineGeo = new THREE.BoxGeometry(0.02, 0.02, 2.0);
    const lineMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.6
    });

    for (let i = 0; i < SPEED_LINE_COUNT; i++) {
        const line = new THREE.Mesh(lineGeo, lineMat.clone());
        line.visible = false;
        line.userData.velocity = 0;
        line.userData.life = 0;
        scene.add(line);
        speedLines.push(line);
    }
}

function resetSpeedLine(line) {
    // Position around the camera in a ring ahead
    const angle = Math.random() * Math.PI * 2;
    const radius = 3 + Math.random() * 8;
    const forward = -5 - Math.random() * 15;

    // Position relative to camera
    _slVec.set(
        Math.cos(angle) * radius,
        Math.sin(angle) * radius,
        forward
    );
    _slVec.applyQuaternion(camera.quaternion);
    _slVec.add(camera.position);

    line.position.copy(_slVec);
    line.quaternion.copy(camera.quaternion);
    line.userData.velocity = 80 + Math.random() * 60;
    line.userData.life = 0.3 + Math.random() * 0.5;
    line.visible = true;
    line.material.opacity = 0.4 + Math.random() * 0.4;
}

// ============================================================
// LIGHTING
// ============================================================
function initLighting() {
    mainDirLight = new THREE.DirectionalLight(COLORS.LIGHT_WARM, 1.2);
    mainDirLight.position.set(50, 80, -30);
    mainDirLight.castShadow = true;
    mainDirLight.shadow.mapSize.width = 1024;
    mainDirLight.shadow.mapSize.height = 1024;
    mainDirLight.shadow.camera.near = 0.5;
    mainDirLight.shadow.camera.far = 200;
    mainDirLight.shadow.camera.left = -50;
    mainDirLight.shadow.camera.right = 50;
    mainDirLight.shadow.camera.top = 50;
    mainDirLight.shadow.camera.bottom = -50;
    scene.add(mainDirLight);
    scene.add(mainDirLight.target);

    const ambLight = new THREE.AmbientLight(COLORS.LIGHT_AMBIENT, 0.3);
    scene.add(ambLight);
}

// ============================================================
// INPUT HANDLING
// ============================================================
function initInput() {
    window.addEventListener('mousemove', (e) => {
        input.mouseNormX = (e.clientX / window.innerWidth) * 2 - 1;
        input.mouseNormY = -((e.clientY / window.innerHeight) * 2 - 1);
    });

    window.addEventListener('keydown', (e) => {
        if (input.keys[e.code]) return; // Ignore repeats
        input.keys[e.code] = true;

        const now = clock.elapsedTime;

        // Double-tap detection for barrel roll
        if (e.code === 'KeyA') {
            if (now - input.lastTapA < CONTROLS.DOUBLE_TAP_WINDOW) {
                triggerBarrelRoll(-1);
            }
            input.lastTapA = now;
        }
        if (e.code === 'KeyD') {
            if (now - input.lastTapD < CONTROLS.DOUBLE_TAP_WINDOW) {
                triggerBarrelRoll(1);
            }
            input.lastTapD = now;
        }
    });

    window.addEventListener('keyup', (e) => {
        input.keys[e.code] = false;
    });

    window.addEventListener('gamepadconnected', (e) => {
        input.gamepadIndex = e.gamepad.index;
    });

    window.addEventListener('gamepaddisconnected', () => {
        input.gamepadIndex = -1;
        input.useGamepad = false;
    });
}

function triggerBarrelRoll(direction) {
    if (barrelRoll.active || barrelRoll.cooldownTimer > 0) return;
    barrelRoll.active = true;
    barrelRoll.progress = 0;
    barrelRoll.direction = direction;
}

let prevGamepadLeftX = 0;
let prevGamepadLeftTime = 0;

function processInput(dt) {
    // Keyboard boost
    isBoosting = !!input.keys['ShiftLeft'] || !!input.keys['ShiftRight'];

    // Mouse -> target offset
    if (!input.useGamepad) {
        targetOffset.x = input.mouseNormX * BOUNDS.MOVE_X;
        targetOffset.y = input.mouseNormY * BOUNDS.MOVE_Y;
    }

    // Gamepad
    if (input.gamepadIndex >= 0) {
        const gp = navigator.getGamepads()[input.gamepadIndex];
        if (gp) {
            const lx = gp.axes[0];
            const ly = gp.axes[1];
            const magnitude = Math.sqrt(lx * lx + ly * ly);

            if (magnitude > CONTROLS.GAMEPAD_DEADZONE) {
                input.useGamepad = true;
                targetOffset.x = lx * BOUNDS.MOVE_X;
                targetOffset.y = -ly * BOUNDS.MOVE_Y;

                // Double-tap detection on stick
                const now = clock.elapsedTime;
                if (lx < -0.7 && prevGamepadLeftX > -0.3) {
                    if (now - prevGamepadLeftTime < CONTROLS.DOUBLE_TAP_WINDOW) {
                        triggerBarrelRoll(-1);
                    }
                    prevGamepadLeftTime = now;
                } else if (lx > 0.7 && prevGamepadLeftX < 0.3) {
                    if (now - prevGamepadLeftTime < CONTROLS.DOUBLE_TAP_WINDOW) {
                        triggerBarrelRoll(1);
                    }
                    prevGamepadLeftTime = now;
                }
                prevGamepadLeftX = lx;
            } else if (input.useGamepad && magnitude < CONTROLS.GAMEPAD_DEADZONE * 0.5) {
                // Return to center when stick released
                targetOffset.x = 0;
                targetOffset.y = 0;
            }

            // Bumpers for barrel roll
            if (gp.buttons[4] && gp.buttons[4].pressed) triggerBarrelRoll(-1);
            if (gp.buttons[5] && gp.buttons[5].pressed) triggerBarrelRoll(1);

            // Left trigger for boost
            const triggerValue = gp.buttons[6] ? gp.buttons[6].value : 0;
            if (triggerValue > 0.3) isBoosting = true;
        }
    }

    // Clamp target offset
    targetOffset.x = THREE.MathUtils.clamp(targetOffset.x, -BOUNDS.MOVE_X, BOUNDS.MOVE_X);
    targetOffset.y = THREE.MathUtils.clamp(targetOffset.y, -BOUNDS.MOVE_Y, BOUNDS.MOVE_Y);
}

// ============================================================
// SHIP UPDATE
// ============================================================
function updateShip(dt) {
    // Boost logic
    if (isBoosting && boostMeter > 0) {
        currentSpeed = FLIGHT.BASE_SPEED * FLIGHT.BOOST_MULTIPLIER;
        boostMeter -= dt / FLIGHT.BOOST_RECHARGE_TIME;
        if (boostMeter < 0) boostMeter = 0;
    } else {
        currentSpeed = FLIGHT.BASE_SPEED;
        if (!isBoosting && boostMeter < 1) {
            boostMeter += dt / FLIGHT.BOOST_RECHARGE_TIME;
            if (boostMeter > 1) boostMeter = 1;
        }
    }

    // Advance along spline
    splineProgress += (currentSpeed * dt) / splineLength;
    if (splineProgress >= 1.0) {
        splineProgress = 0; // Loop for now
    }

    // Get spline position and tangent
    const splinePoint = splineCurve.getPointAt(splineProgress);
    const tangent = splineCurve.getTangentAt(splineProgress);

    // Compute local coordinate frame
    const right = _tempVec.crossVectors(tangent, _worldUp).normalize();
    const up = _tempVec2.crossVectors(right, tangent).normalize();

    // Lerp ship offset toward target
    shipOffset.x += (targetOffset.x - shipOffset.x) * CONTROLS.LERP_FACTOR;
    shipOffset.y += (targetOffset.y - shipOffset.y) * CONTROLS.LERP_FACTOR;

    // Idle hover
    const hoverOffset = Math.sin(elapsedTime * 1.5) * 0.3;

    // Position ship
    shipGroup.position.copy(splinePoint);
    shipGroup.position.addScaledVector(right, shipOffset.x);
    shipGroup.position.addScaledVector(up, shipOffset.y + hoverOffset);

    // Orientation - look along tangent
    const lookTarget = _tempVec3.copy(shipGroup.position).addScaledVector(tangent, 10);
    shipGroup.lookAt(lookTarget);

    // Visual banking based on lateral offset velocity
    const lateralDelta = targetOffset.x - shipOffset.x;
    const bankAngle = THREE.MathUtils.clamp(
        lateralDelta * 0.3,
        -CONTROLS.BANK_ANGLE,
        CONTROLS.BANK_ANGLE
    );
    shipGroup.rotation.z += bankAngle;

    // Pitch down when boosting
    if (isBoosting && boostMeter > 0) {
        shipGroup.rotation.x += 0.08;
    }

    // Barrel roll - apply full rotation based on progress fraction
    if (barrelRoll.active) {
        barrelRoll.progress += dt;
        const t = Math.min(barrelRoll.progress / CONTROLS.ROLL_DURATION, 1.0);
        // Eased roll using smoothstep-like curve
        const eased = t * t * (3 - 2 * t);
        shipGroup.rotation.z += eased * Math.PI * 2 * barrelRoll.direction;

        if (barrelRoll.progress >= CONTROLS.ROLL_DURATION) {
            barrelRoll.active = false;
            barrelRoll.cooldownTimer = CONTROLS.ROLL_COOLDOWN;
        }
    }

    // Barrel roll cooldown
    if (barrelRoll.cooldownTimer > 0) {
        barrelRoll.cooldownTimer -= dt;
    }

    // Update directional light to follow ship
    if (mainDirLight) {
        mainDirLight.position.copy(shipGroup.position);
        mainDirLight.position.x += 50;
        mainDirLight.position.y += 80;
        mainDirLight.position.z += -30;
        mainDirLight.target.position.copy(shipGroup.position);
    }
}

// ============================================================
// CAMERA UPDATE
// ============================================================
function updateCamera(dt) {
    // Camera follows a point slightly behind on the spline
    const camT = Math.max(0, splineProgress - (CAM.BEHIND / splineLength));
    const camSplinePoint = splineCurve.getPointAt(camT);
    const camTangent = splineCurve.getTangentAt(camT);

    // Compute camera up from spline frame
    const camRight = _tempVec.crossVectors(camTangent, _worldUp).normalize();
    const camUp = _tempVec2.crossVectors(camRight, camTangent).normalize();

    // Ideal camera position
    const idealPos = _tempVec3.copy(camSplinePoint);
    idealPos.addScaledVector(camUp, CAM.ABOVE);
    // Offset camera slightly with ship offset (dampened)
    idealPos.addScaledVector(camRight, shipOffset.x * 0.3);
    idealPos.addScaledVector(camUp, shipOffset.y * 0.2);

    // Lerp camera toward ideal
    camera.position.lerp(idealPos, CAM.LERP);

    // Look at ship (or slightly ahead of it)
    const lookAt = shipGroup.position.clone().addScaledVector(camTangent, 5);
    camera.lookAt(lookAt);

    // Lerp FOV
    const targetFOV = (isBoosting && boostMeter > 0) ? FLIGHT.BOOST_FOV : FLIGHT.BASE_FOV;
    camera.fov += (targetFOV - camera.fov) * 0.05;
    camera.updateProjectionMatrix();
}

// ============================================================
// SPEED LINES UPDATE
// ============================================================
function updateSpeedLines(dt) {
    const shouldShow = isBoosting && boostMeter > 0;

    for (let i = 0; i < speedLines.length; i++) {
        const line = speedLines[i];

        if (shouldShow) {
            if (!line.visible || line.userData.life <= 0) {
                resetSpeedLine(line);
            }

            // Move line backward along camera forward
            const backward = _slVec.set(0, 0, 1).applyQuaternion(camera.quaternion);
            line.position.addScaledVector(backward, line.userData.velocity * dt);
            line.userData.life -= dt;

            if (line.userData.life <= 0) {
                resetSpeedLine(line);
            }
        } else {
            if (line.visible) {
                line.material.opacity -= dt * 3;
                if (line.material.opacity <= 0) {
                    line.visible = false;
                }
            }
        }
    }
}

// ============================================================
// ARCHITECTURE - SECTION BOUNDARIES
// ============================================================
const SECTIONS = {
    COLONNADE: { start: 0.00, end: 0.30 },
    GAP1:      { start: 0.30, end: 0.38 },
    LABYRINTH: { start: 0.38, end: 0.65 },
    GAP2:      { start: 0.65, end: 0.73 },
    MONOLITH:  { start: 0.73, end: 0.95 },
    END:       { start: 0.95, end: 1.00 }
};

// Seeded PRNG (mulberry32)
function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

let archGroup; // parent group for all architecture
const archObjects = []; // flat list for culling

function getSplineFrame(t) {
    const pos = splineCurve.getPointAt(t);
    const tan = splineCurve.getTangentAt(t);
    const right = new THREE.Vector3().crossVectors(tan, _worldUp).normalize();
    const up = new THREE.Vector3().crossVectors(right, tan).normalize();
    return { pos, tan, right, up };
}

// Shared materials (reused across all sections)
const ARCH_MATS = {};
function initArchMaterials() {
    ARCH_MATS.warmConcrete = new THREE.MeshLambertMaterial({ color: COLORS.CONCRETE, flatShading: true });
    ARCH_MATS.dustyRose = new THREE.MeshLambertMaterial({ color: COLORS.DUSTY_ROSE, flatShading: true });
    ARCH_MATS.coral = new THREE.MeshLambertMaterial({ color: COLORS.CORAL, flatShading: true });
    ARCH_MATS.coolConcrete = new THREE.MeshLambertMaterial({ color: COLORS.COOL_CONCRETE, flatShading: true });
    ARCH_MATS.dustyBlue = new THREE.MeshLambertMaterial({ color: COLORS.DUSTY_BLUE, flatShading: true });
    ARCH_MATS.sage = new THREE.MeshLambertMaterial({ color: COLORS.SAGE, flatShading: true });
    ARCH_MATS.terracotta = new THREE.MeshLambertMaterial({ color: COLORS.TERRACOTTA, flatShading: true });
    ARCH_MATS.darkVoid = new THREE.MeshLambertMaterial({ color: 0x2A2A2A, flatShading: true });
    ARCH_MATS.pool = new THREE.MeshLambertMaterial({
        color: COLORS.DUSTY_BLUE,
        flatShading: true,
        transparent: true,
        opacity: 0.3
    });
}

function addArch(mesh) {
    archGroup.add(mesh);
    archObjects.push(mesh);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
}

// ============================================================
// SECTION 1: THE COLONNADE (Bofill-inspired)
// ============================================================
function buildColonnade() {
    const rng = mulberry32(12345);
    const sec = SECTIONS.COLONNADE;
    const steps = 30;

    for (let i = 0; i < steps; i++) {
        const t = sec.start + (i / steps) * (sec.end - sec.start);
        const frame = getSplineFrame(t);
        const groundY = -18;

        // --- Pillars on both sides ---
        for (const side of [-1, 1]) {
            const dist = 14 + rng() * 4;
            const height = 35 + rng() * 20;
            const pillarGeo = new THREE.BoxGeometry(2, height, 2);
            const pillar = new THREE.Mesh(pillarGeo, ARCH_MATS.warmConcrete);
            pillar.position.copy(frame.pos);
            pillar.position.addScaledVector(frame.right, side * dist);
            pillar.position.y = groundY + height / 2;
            addArch(pillar);
        }

        // --- Wall slabs behind pillars (every other step) ---
        if (i % 2 === 0) {
            for (const side of [-1, 1]) {
                const wallDist = 22 + rng() * 3;
                const wallH = 40 + rng() * 20;
                const wallW = 15 + rng() * 8;
                const wallGeo = new THREE.BoxGeometry(2, wallH, wallW);
                const wall = new THREE.Mesh(wallGeo, ARCH_MATS.dustyRose);
                wall.position.copy(frame.pos);
                wall.position.addScaledVector(frame.right, side * wallDist);
                wall.position.y = groundY + wallH / 2;
                // Rotate to face path
                wall.lookAt(frame.pos);
                wall.rotation.x = 0;
                wall.rotation.z = 0;
                addArch(wall);

                // Void openings in walls
                const voidCount = 1 + Math.floor(rng() * 3);
                for (let v = 0; v < voidCount; v++) {
                    const voidH = 6 + rng() * 8;
                    const voidW = 3 + rng() * 4;
                    const voidGeo = new THREE.BoxGeometry(2.5, voidH, voidW);
                    const voidMesh = new THREE.Mesh(voidGeo, ARCH_MATS.darkVoid);
                    voidMesh.position.copy(wall.position);
                    voidMesh.position.y = groundY + 8 + rng() * (wallH - 16);
                    voidMesh.position.addScaledVector(frame.right, side * -0.5);
                    const zOff = (rng() - 0.5) * (wallW * 0.6);
                    voidMesh.position.addScaledVector(frame.tan, zOff);
                    voidMesh.rotation.copy(wall.rotation);
                    addArch(voidMesh);

                    // Coral inner face on some voids
                    if (rng() > 0.6) {
                        const accentGeo = new THREE.BoxGeometry(0.5, voidH - 1, voidW - 1);
                        const accent = new THREE.Mesh(accentGeo, ARCH_MATS.coral);
                        accent.position.copy(voidMesh.position);
                        accent.position.addScaledVector(frame.right, side * 0.8);
                        accent.rotation.copy(wall.rotation);
                        addArch(accent);
                    }
                }
            }
        }

        // --- Overhead lintels (occasional) ---
        if (i % 5 === 0 && i > 2) {
            const lintelW = 30 + rng() * 8;
            const lintelH = 2;
            const lintelD = 4 + rng() * 3;
            const lintelGeo = new THREE.BoxGeometry(lintelW, lintelH, lintelD);
            const lintel = new THREE.Mesh(lintelGeo,
                rng() > 0.5 ? ARCH_MATS.coral : ARCH_MATS.warmConcrete);
            lintel.position.copy(frame.pos);
            lintel.position.y = groundY + 38 + rng() * 15;
            // Orient lintel perpendicular to path
            lintel.lookAt(frame.pos.clone().add(frame.tan));
            lintel.rotation.x = 0;
            lintel.rotation.z = 0;
            addArch(lintel);
        }
    }

    // --- Reflecting pool ---
    const poolStart = getSplineFrame(sec.start + 0.02);
    const poolEnd = getSplineFrame(sec.end - 0.02);
    const poolLength = poolStart.pos.distanceTo(poolEnd.pos);
    const poolMid = new THREE.Vector3().lerpVectors(poolStart.pos, poolEnd.pos, 0.5);
    const poolGeo = new THREE.PlaneGeometry(20, poolLength);
    const pool = new THREE.Mesh(poolGeo, ARCH_MATS.pool);
    pool.rotation.x = -Math.PI / 2;
    pool.position.copy(poolMid);
    pool.position.y = -17.9;
    // Orient pool along the path
    pool.lookAt(poolEnd.pos.x, -17.9, poolEnd.pos.z);
    pool.rotation.x = -Math.PI / 2;
    archGroup.add(pool);
    archObjects.push(pool);

    // --- Narrow gap set piece at midpoint ---
    const midT = (sec.start + sec.end) / 2;
    const midFrame = getSplineFrame(midT);
    for (const side of [-1, 1]) {
        const gapWallGeo = new THREE.BoxGeometry(3, 55, 12);
        const gapWall = new THREE.Mesh(gapWallGeo, ARCH_MATS.dustyRose);
        gapWall.position.copy(midFrame.pos);
        gapWall.position.addScaledVector(midFrame.right, side * 7);
        gapWall.position.y = -18 + 27.5;
        gapWall.lookAt(midFrame.pos);
        gapWall.rotation.x = 0;
        gapWall.rotation.z = 0;
        addArch(gapWall);
    }
}

// ============================================================
// SECTION 2: THE LABYRINTH (Scarpa-inspired)
// ============================================================
function buildLabyrinth() {
    const rng = mulberry32(67890);
    const sec = SECTIONS.LABYRINTH;
    const steps = 35;
    const groundY = -18;

    for (let i = 0; i < steps; i++) {
        const t = sec.start + (i / steps) * (sec.end - sec.start);
        const frame = getSplineFrame(t);

        // --- Corridor walls (closer, taller) ---
        for (const side of [-1, 1]) {
            const dist = 10 + rng() * 6;
            const height = 55 + rng() * 30;
            const depth = 8 + rng() * 10;
            const wallGeo = new THREE.BoxGeometry(3, height, depth);
            const wall = new THREE.Mesh(wallGeo, ARCH_MATS.coolConcrete);
            wall.position.copy(frame.pos);
            wall.position.addScaledVector(frame.right, side * dist);
            wall.position.y = groundY + height / 2;
            wall.lookAt(frame.pos);
            wall.rotation.x = 0;
            wall.rotation.z = 0;
            addArch(wall);

            // Layered openings (rectangular holes)
            if (rng() > 0.4) {
                const holeH = 8 + rng() * 12;
                const holeW = 4 + rng() * 5;
                const holeGeo = new THREE.BoxGeometry(4, holeH, holeW);
                const hole = new THREE.Mesh(holeGeo, ARCH_MATS.darkVoid);
                hole.position.copy(wall.position);
                hole.position.y = groundY + 15 + rng() * 25;
                hole.rotation.copy(wall.rotation);
                addArch(hole);
            }

            // Stepped bases (Scarpa detail)
            if (rng() > 0.5) {
                for (let s = 0; s < 3; s++) {
                    const stepW = 4 - s * 0.6;
                    const stepH = 2;
                    const stepD = depth + 2 - s * 1;
                    const stepGeo = new THREE.BoxGeometry(stepW, stepH, stepD);
                    const stepMat = s === 2 ? ARCH_MATS.sage : ARCH_MATS.coolConcrete;
                    const step = new THREE.Mesh(stepGeo, stepMat);
                    step.position.copy(wall.position);
                    step.position.y = groundY + s * 2 + 1;
                    step.position.addScaledVector(frame.right, side * -1);
                    step.rotation.copy(wall.rotation);
                    addArch(step);
                }
            }
        }

        // --- Cantilevered platforms ---
        if (i % 3 === 0) {
            const side = rng() > 0.5 ? 1 : -1;
            const platW = 8 + rng() * 10;
            const platD = 6 + rng() * 6;
            const platH = 1.0 + rng() * 0.5;
            const platGeo = new THREE.BoxGeometry(platW, platH, platD);
            const platMat = rng() > 0.5 ? ARCH_MATS.dustyBlue : ARCH_MATS.coolConcrete;
            const plat = new THREE.Mesh(platGeo, platMat);
            plat.position.copy(frame.pos);
            plat.position.addScaledVector(frame.right, side * (5 + rng() * 6));
            plat.position.y = groundY + 18 + rng() * 25;
            plat.lookAt(frame.pos);
            plat.rotation.x = 0;
            plat.rotation.z = 0;
            addArch(plat);
        }

        // --- Interlocking volumes (stacked boxes) ---
        if (i % 4 === 0) {
            const numBoxes = 2 + Math.floor(rng() * 3);
            const baseSide = rng() > 0.5 ? 1 : -1;
            for (let b = 0; b < numBoxes; b++) {
                const bw = 4 + rng() * 8;
                const bh = 5 + rng() * 15;
                const bd = 4 + rng() * 8;
                const boxGeo = new THREE.BoxGeometry(bw, bh, bd);
                const boxMats = [ARCH_MATS.coolConcrete, ARCH_MATS.dustyBlue, ARCH_MATS.sage];
                const box = new THREE.Mesh(boxGeo, boxMats[Math.floor(rng() * boxMats.length)]);
                box.position.copy(frame.pos);
                box.position.addScaledVector(frame.right, baseSide * (12 + rng() * 8));
                box.position.y = groundY + bh / 2 + b * (5 + rng() * 8);
                box.position.addScaledVector(frame.tan, (rng() - 0.5) * 6);
                // Slight rotation for organic feel
                box.rotation.y = (rng() - 0.5) * 0.3;
                addArch(box);
            }
        }

        // --- Ground channels (perpendicular to path) ---
        if (i % 2 === 0) {
            const chanW = 18 + rng() * 12;
            const chanGeo = new THREE.BoxGeometry(chanW, 0.5, 0.4);
            const chan = new THREE.Mesh(chanGeo, ARCH_MATS.darkVoid);
            chan.position.copy(frame.pos);
            chan.position.y = groundY - 0.15;
            chan.lookAt(frame.pos.clone().add(frame.tan));
            chan.rotation.x = 0;
            chan.rotation.z = 0;
            addArch(chan);
        }
    }

    // --- Bridge set piece ---
    const bridgeT = (sec.start + sec.end) / 2;
    const bridgeFrame = getSplineFrame(bridgeT);
    const bridgeGeo = new THREE.BoxGeometry(35, 3, 10);
    const bridge = new THREE.Mesh(bridgeGeo, ARCH_MATS.coolConcrete);
    bridge.position.copy(bridgeFrame.pos);
    bridge.position.y = bridgeFrame.pos.y + 20;
    bridge.lookAt(bridgeFrame.pos.clone().add(bridgeFrame.tan));
    bridge.rotation.x = 0;
    bridge.rotation.z = 0;
    addArch(bridge);
    bridge.userData.isBridge = true; // Tag for Phase 3 crumbling
}

// ============================================================
// SECTION 3: THE MONOLITH
// ============================================================
function buildMonolith() {
    const rng = mulberry32(24680);
    const sec = SECTIONS.MONOLITH;
    const groundY = -18;

    // Find the center of this section on the spline
    const centerT = (sec.start + sec.end) / 2;
    const centerFrame = getSplineFrame(centerT);

    // --- THE MONOLITH: massive central structure ---
    const monoW = 40, monoH = 65, monoD = 40;
    const monoGeo = new THREE.BoxGeometry(monoW, monoH, monoD);
    const monolith = new THREE.Mesh(monoGeo, ARCH_MATS.warmConcrete);
    // Position to the side of the path so the ship spirals around it
    monolith.position.copy(centerFrame.pos);
    monolith.position.addScaledVector(centerFrame.right, 35);
    monolith.position.y = groundY + monoH / 2;
    addArch(monolith);

    // Stepped top setbacks
    const setbacks = [
        { w: 34, h: 10, d: 34, yOff: monoH },
        { w: 26, h: 8, d: 26, yOff: monoH + 10 },
        { w: 18, h: 6, d: 18, yOff: monoH + 18 }
    ];
    for (const sb of setbacks) {
        const sbGeo = new THREE.BoxGeometry(sb.w, sb.h, sb.d);
        const sbMesh = new THREE.Mesh(sbGeo, ARCH_MATS.warmConcrete);
        sbMesh.position.copy(monolith.position);
        sbMesh.position.y = groundY + sb.yOff + sb.h / 2;
        addArch(sbMesh);
    }

    // Recessed voids on all 4 faces
    const faces = [
        { axis: 'x', sign: 1 },
        { axis: 'x', sign: -1 },
        { axis: 'z', sign: 1 },
        { axis: 'z', sign: -1 }
    ];
    for (const face of faces) {
        const voidCount = 4 + Math.floor(rng() * 4);
        for (let v = 0; v < voidCount; v++) {
            const vw = 4 + rng() * 8;
            const vh = 5 + rng() * 12;
            const vd = 3 + rng() * 4;
            const voidGeo = new THREE.BoxGeometry(
                face.axis === 'x' ? vd : vw,
                vh,
                face.axis === 'z' ? vd : vw
            );
            const voidMesh = new THREE.Mesh(voidGeo, ARCH_MATS.darkVoid);
            voidMesh.position.copy(monolith.position);
            voidMesh.position.y = groundY + 8 + rng() * (monoH - 16);
            if (face.axis === 'x') {
                voidMesh.position.x += face.sign * (monoW / 2 - vd / 2 + 0.5);
                voidMesh.position.z += (rng() - 0.5) * (monoD - vw - 2);
            } else {
                voidMesh.position.z += face.sign * (monoD / 2 - vd / 2 + 0.5);
                voidMesh.position.x += (rng() - 0.5) * (monoW - vw - 2);
            }
            addArch(voidMesh);

            // Accent colored panels inside some recesses
            if (rng() > 0.5) {
                const panelMats = [ARCH_MATS.coral, ARCH_MATS.dustyBlue, ARCH_MATS.sage, ARCH_MATS.terracotta, ARCH_MATS.dustyRose];
                const panelMat = panelMats[Math.floor(rng() * panelMats.length)];
                const panelGeo = new THREE.BoxGeometry(
                    face.axis === 'x' ? 0.5 : vw - 1,
                    vh - 1,
                    face.axis === 'z' ? 0.5 : vw - 1
                );
                const panel = new THREE.Mesh(panelGeo, panelMat);
                panel.position.copy(voidMesh.position);
                if (face.axis === 'x') {
                    panel.position.x += face.sign * 1;
                } else {
                    panel.position.z += face.sign * 1;
                }
                addArch(panel);
            }
        }
    }

    // --- Facade panels (will blow off in Phase 3) ---
    const panelColors = [ARCH_MATS.coral, ARCH_MATS.dustyBlue, ARCH_MATS.sage, ARCH_MATS.terracotta];
    for (const face of faces) {
        const panelCount = 2 + Math.floor(rng() * 3);
        for (let p = 0; p < panelCount; p++) {
            const pw = 5 + rng() * 6;
            const ph = 5 + rng() * 8;
            const panelGeo = new THREE.BoxGeometry(
                face.axis === 'x' ? 1.5 : pw,
                ph,
                face.axis === 'z' ? 1.5 : pw
            );
            const panel = new THREE.Mesh(panelGeo, panelColors[Math.floor(rng() * panelColors.length)]);
            panel.position.copy(monolith.position);
            panel.position.y = groundY + 10 + rng() * (monoH - 20);
            if (face.axis === 'x') {
                panel.position.x += face.sign * (monoW / 2 + 0.75);
                panel.position.z += (rng() - 0.5) * (monoD - pw - 4);
            } else {
                panel.position.z += face.sign * (monoD / 2 + 0.75);
                panel.position.x += (rng() - 0.5) * (monoW - pw - 4);
            }
            panel.userData.isFacadePanel = true; // Tag for Phase 3
            addArch(panel);
        }
    }

    // --- Arena floor grid ---
    const gridSize = 100;
    const gridStep = 8;
    for (let gx = -gridSize / 2; gx <= gridSize / 2; gx += gridStep) {
        const lineGeo = new THREE.BoxGeometry(0.3, 0.15, gridSize);
        const line = new THREE.Mesh(lineGeo, ARCH_MATS.darkVoid);
        line.position.copy(monolith.position);
        line.position.x += gx - monoW / 2 + 20;
        line.position.y = groundY + 0.08;
        archGroup.add(line);
        archObjects.push(line);
    }
    for (let gz = -gridSize / 2; gz <= gridSize / 2; gz += gridStep) {
        const lineGeo = new THREE.BoxGeometry(gridSize, 0.15, 0.3);
        const line = new THREE.Mesh(lineGeo, ARCH_MATS.darkVoid);
        line.position.copy(monolith.position);
        line.position.z += gz - monoD / 2 + 20;
        line.position.y = groundY + 0.08;
        archGroup.add(line);
        archObjects.push(line);
    }

    // --- Perimeter structures (ruins/column stubs) ---
    const perimSteps = 20;
    for (let i = 0; i < perimSteps; i++) {
        const t = sec.start + (i / perimSteps) * (sec.end - sec.start);
        const frame = getSplineFrame(t);

        for (const side of [-1, 1]) {
            if (rng() > 0.4) continue; // sparse
            const dist = 25 + rng() * 15;
            const stubH = 5 + rng() * 15;
            const stubW = 2 + rng() * 4;
            const stubGeo = new THREE.BoxGeometry(stubW, stubH, stubW);
            const stubMats = [ARCH_MATS.warmConcrete, ARCH_MATS.dustyRose, ARCH_MATS.coolConcrete];
            const stub = new THREE.Mesh(stubGeo, stubMats[Math.floor(rng() * stubMats.length)]);
            stub.position.copy(frame.pos);
            stub.position.addScaledVector(frame.right, side * dist);
            stub.position.y = groundY + stubH / 2;
            stub.rotation.y = rng() * Math.PI;
            addArch(stub);
        }
    }
}

// ============================================================
// ARCHITECTURE MASTER BUILDER
// ============================================================
function buildArchitecture() {
    initArchMaterials();
    archGroup = new THREE.Group();

    buildColonnade();
    buildLabyrinth();
    buildMonolith();

    scene.add(archGroup);
}

// ============================================================
// ARCHITECTURE CULLING (distance-based visibility)
// ============================================================
function updateArchCulling() {
    const camPos = camera.position;
    const cullDist = 250;
    const cullDistSq = cullDist * cullDist;

    for (let i = 0; i < archObjects.length; i++) {
        const obj = archObjects[i];
        const dx = obj.position.x - camPos.x;
        const dy = obj.position.y - camPos.y;
        const dz = obj.position.z - camPos.z;
        const distSq = dx * dx + dy * dy + dz * dz;
        obj.visible = distSq < cullDistSq;
    }
}

// ============================================================
// RESIZE HANDLER
// ============================================================
function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// COMBAT - OBJECT POOLS
// ============================================================
function createProjectilePool() {
    const geo = new THREE.BoxGeometry(0.15, 0.15, 0.6);
    const mat = new THREE.MeshBasicMaterial({ color: COLORS.LASER });
    for (let i = 0; i < COMBAT.PROJ_POOL_SIZE; i++) {
        const proj = new THREE.Mesh(geo, mat);
        proj.visible = false;
        proj.userData = { active: false, velocity: new THREE.Vector3(), traveled: 0 };
        scene.add(proj);
        playerProjectiles.push(proj);
    }
}

function createEnemyProjectilePool() {
    const geo = new THREE.SphereGeometry(0.4, 6, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xE63988 });
    for (let i = 0; i < COMBAT.ENEMY_PROJ_POOL; i++) {
        const proj = new THREE.Mesh(geo, mat);
        proj.visible = false;
        proj.userData = { active: false, velocity: new THREE.Vector3(), traveled: 0, age: 0 };
        scene.add(proj);
        enemyProjectiles.push(proj);
    }
}

function createDronePool() {
    const geo = new THREE.OctahedronGeometry(1, 0);
    const mat = new THREE.MeshPhongMaterial({ color: 0xE63988, emissive: 0xE63988, emissiveIntensity: 0.3, flatShading: true });
    for (let i = 0; i < 20; i++) {
        const drone = new THREE.Mesh(geo, mat.clone());
        drone.visible = false;
        drone.userData = {
            active: false, hp: 1, hitbox: COMBAT.DRONE_HITBOX,
            type: 'drone', basePos: new THREE.Vector3(),
            phase: Math.random() * Math.PI * 2, flashTimer: 0
        };
        scene.add(drone);
        drones.push(drone);
    }
}

function createTurretPool() {
    for (let i = 0; i < 10; i++) {
        const group = new THREE.Group();
        const bodyGeo = new THREE.IcosahedronGeometry(1.5, 0);
        const bodyMat = new THREE.MeshPhongMaterial({ color: COLORS.DUSTY_BLUE, flatShading: true });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        group.add(body);
        const eyeGeo = new THREE.SphereGeometry(0.35, 6, 4);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xE63988 });
        const eye = new THREE.Mesh(eyeGeo, eyeMat);
        eye.name = 'eye';
        group.add(eye);
        group.visible = false;
        group.userData = {
            active: false, hp: COMBAT.TURRET_HP, hitbox: COMBAT.TURRET_HITBOX,
            type: 'turret', fireTimer: 2, charging: false, chargeTimer: 0,
            flashTimer: 0, baseEmissive: 0.3
        };
        scene.add(group);
        turrets.push(group);
    }
}

function createShardPool() {
    const geo = new THREE.OctahedronGeometry(0.3, 0);
    const mat = new THREE.MeshBasicMaterial({ color: COLORS.CURRENCY });
    for (let i = 0; i < COMBAT.SHARD_POOL_SIZE; i++) {
        const shard = new THREE.Mesh(geo, mat.clone());
        shard.visible = false;
        shard.userData = { active: false, age: 0 };
        scene.add(shard);
        shards.push(shard);
    }
}

function createFragmentPool() {
    const geo = new THREE.TetrahedronGeometry(0.3, 0);
    for (let i = 0; i < COMBAT.FRAGMENT_POOL_SIZE; i++) {
        const frag = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true }));
        frag.visible = false;
        frag.userData = { active: false, velocity: new THREE.Vector3(), life: 0, maxLife: 0.5 };
        scene.add(frag);
        fragments.push(frag);
    }
}

function initCombat() {
    createProjectilePool();
    createEnemyProjectilePool();
    createDronePool();
    createTurretPool();
    createShardPool();
    createFragmentPool();

    // Store ship original materials for damage flash
    shipGroup.traverse(child => {
        if (child.isMesh && child.material) {
            shipOriginalMats.push({ mesh: child, color: child.material.color.getHex() });
        }
    });

    // Fire input
    window.addEventListener('mousedown', (e) => { if (e.button === 0) isFireHeld = true; });
    window.addEventListener('mouseup', (e) => { if (e.button === 0) isFireHeld = false; });

    // Game over click to restart
    document.getElementById('game-over').addEventListener('click', () => { location.reload(); });
}

// ============================================================
// COMBAT - SPAWN EVENTS
// ============================================================
const spawnEvents = [
    // Section 1: Colonnade - drones only
    { t: 0.05, type: 'drone', count: 3, formation: 'v', side: 'left' },
    { t: 0.10, type: 'drone', count: 2, formation: 'line', side: 'right' },
    { t: 0.15, type: 'drone', count: 4, formation: 'diamond', side: 'center' },
    { t: 0.20, type: 'drone', count: 3, formation: 'v', side: 'right' },
    { t: 0.25, type: 'drone', count: 5, formation: 'line', side: 'left' },
    // Section 2: Labyrinth - drones + turrets
    { t: 0.40, type: 'drone', count: 3, formation: 'v', side: 'left' },
    { t: 0.42, type: 'turret', count: 2, wallSide: 'left' },
    { t: 0.46, type: 'drone', count: 4, formation: 'diamond', side: 'center' },
    { t: 0.50, type: 'turret', count: 2, wallSide: 'right' },
    { t: 0.52, type: 'drone', count: 4, formation: 'line', side: 'right' },
    { t: 0.55, type: 'turret', count: 3, wallSide: 'both' },
    { t: 0.58, type: 'drone', count: 3, formation: 'v', side: 'center' },
    { t: 0.62, type: 'drone', count: 3, formation: 'line', side: 'left' },
    { t: 0.63, type: 'turret', count: 2, wallSide: 'right' },
    // Section 3: Monolith - heavier
    { t: 0.74, type: 'drone', count: 4, formation: 'diamond', side: 'center' },
    { t: 0.76, type: 'turret', count: 3, wallSide: 'both' },
    { t: 0.78, type: 'drone', count: 5, formation: 'v', side: 'left' },
    { t: 0.82, type: 'drone', count: 4, formation: 'line', side: 'right' },
    { t: 0.85, type: 'turret', count: 2, wallSide: 'left' },
    { t: 0.88, type: 'drone', count: 6, formation: 'diamond', side: 'center' },
    { t: 0.92, type: 'turret', count: 3, wallSide: 'both' },
];
let triggeredSpawns = new Set();

function getFormationOffsets(formation, count) {
    const offsets = [];
    const spacing = 3;
    if (formation === 'v') {
        for (let i = 0; i < count; i++) {
            const row = Math.floor(i / 2);
            const side = i % 2 === 0 ? -1 : 1;
            if (i === 0) offsets.push({ x: 0, y: 0 });
            else offsets.push({ x: side * row * spacing, y: -row * spacing * 0.5 });
        }
    } else if (formation === 'line') {
        const half = (count - 1) / 2;
        for (let i = 0; i < count; i++) offsets.push({ x: (i - half) * spacing, y: 0 });
    } else if (formation === 'diamond') {
        offsets.push({ x: 0, y: spacing });
        offsets.push({ x: -spacing, y: 0 });
        offsets.push({ x: spacing, y: 0 });
        offsets.push({ x: 0, y: -spacing });
        for (let i = 4; i < count; i++) offsets.push({ x: (Math.random() - 0.5) * spacing * 2, y: (Math.random() - 0.5) * spacing * 2 });
    }
    return offsets;
}

function spawnDrone(pos) {
    for (const d of drones) {
        if (!d.userData.active) {
            d.userData.active = true;
            d.userData.hp = COMBAT.DRONE_HP;
            d.userData.flashTimer = 0;
            d.userData.basePos.copy(pos);
            d.userData.phase = Math.random() * Math.PI * 2;
            d.position.copy(pos);
            d.visible = true;
            d.material.color.setHex(0xE63988);
            d.material.emissiveIntensity = 0.3;
            d.scale.set(1, 1, 1);
            return d;
        }
    }
    return null;
}

function spawnTurret(pos) {
    for (const t of turrets) {
        if (!t.userData.active) {
            t.userData.active = true;
            t.userData.hp = COMBAT.TURRET_HP;
            t.userData.fireTimer = 1.5 + Math.random();
            t.userData.charging = false;
            t.userData.chargeTimer = 0;
            t.userData.flashTimer = 0;
            t.position.copy(pos);
            t.visible = true;
            // Reset body color
            t.children[0].material.color.setHex(COLORS.DUSTY_BLUE);
            t.scale.set(1, 1, 1);
            return t;
        }
    }
    return null;
}

function processSpawns() {
    for (let i = 0; i < spawnEvents.length; i++) {
        if (triggeredSpawns.has(i)) continue;
        const ev = spawnEvents[i];
        if (splineProgress >= ev.t) {
            triggeredSpawns.add(i);
            const frame = getSplineFrame(Math.min(ev.t + 0.02, 0.999));

            if (ev.type === 'drone') {
                const offsets = getFormationOffsets(ev.formation, ev.count);
                let baseOffset = new THREE.Vector3();
                if (ev.side === 'left') baseOffset.copy(frame.right).multiplyScalar(-15);
                else if (ev.side === 'right') baseOffset.copy(frame.right).multiplyScalar(15);
                else baseOffset.copy(frame.tan).multiplyScalar(30);
                // Position ahead of player
                const spawnPos = frame.pos.clone().add(baseOffset).addScaledVector(frame.tan, -40);

                for (const off of offsets) {
                    const pos = spawnPos.clone()
                        .addScaledVector(frame.right, off.x)
                        .addScaledVector(frame.up, off.y + 3);
                    spawnDrone(pos);
                }
            } else if (ev.type === 'turret') {
                const wallDist = 12;
                for (let j = 0; j < ev.count; j++) {
                    const tOff = ev.count > 1 ? (j / (ev.count - 1) - 0.5) * 0.02 : 0;
                    const tFrame = getSplineFrame(Math.min(ev.t + 0.02 + tOff, 0.999));
                    const sides = ev.wallSide === 'both' ? [-1, 1] : [ev.wallSide === 'left' ? -1 : 1];
                    for (const s of sides) {
                        const pos = tFrame.pos.clone()
                            .addScaledVector(tFrame.right, s * wallDist)
                            .addScaledVector(tFrame.tan, -30);
                        pos.y = tFrame.pos.y + 2;
                        spawnTurret(pos);
                    }
                }
            }
        }
    }
}

// ============================================================
// COMBAT - SHOOTING
// ============================================================
function fireProjectile() {
    for (const p of playerProjectiles) {
        if (!p.userData.active) {
            p.userData.active = true;
            p.userData.traveled = 0;
            p.visible = true;

            // Fire from ship toward aim point
            p.position.copy(shipGroup.position);

            // Get aim direction from camera through crosshair
            aimRaycaster.setFromCamera(aimNDC, camera);
            const dir = aimRaycaster.ray.direction.clone().normalize();
            p.userData.velocity.copy(dir).multiplyScalar(COMBAT.PROJ_SPEED);

            // Orient projectile along velocity
            p.lookAt(p.position.clone().add(dir));
            return;
        }
    }
}

function fireEnemyProjectile(fromPos, targetPos) {
    for (const p of enemyProjectiles) {
        if (!p.userData.active) {
            p.userData.active = true;
            p.userData.traveled = 0;
            p.userData.age = 0;
            p.visible = true;
            p.position.copy(fromPos);
            const dir = new THREE.Vector3().subVectors(targetPos, fromPos).normalize();
            p.userData.velocity.copy(dir).multiplyScalar(COMBAT.ENEMY_PROJ_SPEED);
            return;
        }
    }
}

// ============================================================
// COMBAT - ENEMY UPDATES
// ============================================================
function updateDrones(dt) {
    for (const d of drones) {
        if (!d.userData.active) continue;

        // Rotate
        d.rotation.x += dt * 1.0;
        d.rotation.y += dt * 0.7;

        // Sine-wave drift
        d.userData.phase += dt;
        const driftX = Math.sin(d.userData.phase * 1.2) * 3;
        const driftY = Math.cos(d.userData.phase * 0.8) * 2;
        d.position.x = d.userData.basePos.x + driftX;
        d.position.y = d.userData.basePos.y + driftY;

        // Drift slowly toward player along z
        const toShip = shipGroup.position.z - d.position.z;
        if (Math.abs(toShip) > 5) {
            d.position.z += Math.sign(toShip) * dt * 8;
            d.userData.basePos.z += Math.sign(toShip) * dt * 8;
        }

        // Flash timer
        if (d.userData.flashTimer > 0) {
            d.userData.flashTimer -= dt;
            d.material.color.setHex(d.userData.flashTimer > 0 ? 0xffffff : 0xE63988);
        }

        // Despawn if too far behind player
        if (d.position.distanceTo(shipGroup.position) > 200) {
            d.userData.active = false;
            d.visible = false;
        }
    }
}

function updateTurrets(dt) {
    for (const t of turrets) {
        if (!t.userData.active) continue;

        // Track player
        const eye = t.children.find(c => c.name === 'eye');
        if (eye) {
            const dir = new THREE.Vector3().subVectors(shipGroup.position, t.position).normalize();
            eye.position.copy(dir.multiplyScalar(0.6));
        }

        // Flash timer
        if (t.userData.flashTimer > 0) {
            t.userData.flashTimer -= dt;
            t.children[0].material.color.setHex(t.userData.flashTimer > 0 ? 0xffffff : COLORS.DUSTY_BLUE);
        }

        // Fire logic
        t.userData.fireTimer -= dt;
        if (t.userData.fireTimer <= 0 && !t.userData.charging) {
            t.userData.charging = true;
            t.userData.chargeTimer = COMBAT.TURRET_CHARGE_TIME;
        }

        if (t.userData.charging) {
            t.userData.chargeTimer -= dt;
            // Pulse eye during charge
            if (eye) {
                const pulse = 1 + Math.sin(t.userData.chargeTimer * 15) * 0.3;
                eye.scale.set(pulse, pulse, pulse);
            }
            if (t.userData.chargeTimer <= 0) {
                // Fire
                t.userData.charging = false;
                t.userData.fireTimer = COMBAT.TURRET_FIRE_INTERVAL;
                if (eye) eye.scale.set(1, 1, 1);
                // Only fire if player is somewhat close
                if (t.position.distanceTo(shipGroup.position) < 100) {
                    fireEnemyProjectile(t.position, shipGroup.position.clone());
                }
            }
        }

        // Despawn if too far behind
        if (t.position.distanceTo(shipGroup.position) > 200) {
            t.userData.active = false;
            t.visible = false;
        }
    }
}

// ============================================================
// COMBAT - PROJECTILE UPDATES
// ============================================================
function updatePlayerProjectiles(dt) {
    for (const p of playerProjectiles) {
        if (!p.userData.active) continue;
        p.position.addScaledVector(p.userData.velocity, dt);
        p.userData.traveled += COMBAT.PROJ_SPEED * dt;
        if (p.userData.traveled > COMBAT.PROJ_MAX_DIST) {
            p.userData.active = false;
            p.visible = false;
        }
    }
}

function updateEnemyProjectiles(dt) {
    for (const p of enemyProjectiles) {
        if (!p.userData.active) continue;
        p.position.addScaledVector(p.userData.velocity, dt);
        p.userData.traveled += COMBAT.ENEMY_PROJ_SPEED * dt;
        p.userData.age += dt;
        if (p.userData.traveled > COMBAT.ENEMY_PROJ_MAX_DIST || p.userData.age > COMBAT.ENEMY_PROJ_MAX_TIME) {
            p.userData.active = false;
            p.visible = false;
        }
    }
}

// ============================================================
// COMBAT - COLLISION DETECTION
// ============================================================
function spawnFragments(pos, color, count) {
    let spawned = 0;
    for (const f of fragments) {
        if (!f.userData.active && spawned < count) {
            f.userData.active = true;
            f.userData.life = 0;
            f.userData.maxLife = 0.4 + Math.random() * 0.3;
            f.position.copy(pos);
            f.material.color.setHex(color);
            f.material.opacity = 1;
            f.visible = true;
            f.scale.set(0.5 + Math.random() * 0.8, 0.5 + Math.random() * 0.8, 0.5 + Math.random() * 0.8);
            f.userData.velocity.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20
            );
            spawned++;
        }
    }
}

function spawnDeathFlash(pos, color) {
    // Use a fragment as a flash sphere
    for (const f of fragments) {
        if (!f.userData.active) {
            f.userData.active = true;
            f.userData.life = 0;
            f.userData.maxLife = 0.25;
            f.position.copy(pos);
            f.material.color.setHex(color);
            f.material.opacity = 1;
            f.visible = true;
            f.scale.set(3, 3, 3);
            f.userData.velocity.set(0, 0, 0);
            return;
        }
    }
}

function spawnShards(pos, count) {
    let spawned = 0;
    for (const s of shards) {
        if (!s.userData.active && spawned < count) {
            s.userData.active = true;
            s.userData.age = Math.random() * Math.PI * 2;
            s.position.copy(pos);
            s.position.x += (Math.random() - 0.5) * 3;
            s.position.y += (Math.random() - 0.5) * 2;
            s.position.z += (Math.random() - 0.5) * 3;
            s.visible = true;
            s.material.opacity = 1;
            spawned++;
        }
    }
}

function enemyDeath(enemy) {
    const pos = enemy.position ? enemy.position.clone() :
        (enemy instanceof THREE.Group ? enemy.position.clone() : new THREE.Vector3());
    const type = enemy.userData.type;

    enemy.userData.active = false;
    enemy.visible = false;

    if (type === 'drone') {
        spawnFragments(pos, 0xE63988, 7);
        spawnDeathFlash(pos, 0xffffff);
        spawnShards(pos, 1);
        score += 100;
    } else if (type === 'turret') {
        spawnFragments(pos, COLORS.DUSTY_BLUE, 5);
        spawnDeathFlash(pos, 0x00F0FF);
        spawnShards(pos, 3);
        score += 250;
    }

    document.getElementById('score').textContent = score;
}

function checkCollisions() {
    // Player projectiles vs enemies
    for (const p of playerProjectiles) {
        if (!p.userData.active) continue;

        for (const d of drones) {
            if (!d.userData.active) continue;
            if (p.position.distanceTo(d.position) < COMBAT.DRONE_HITBOX + 0.3) {
                p.userData.active = false;
                p.visible = false;
                d.userData.hp--;
                d.userData.flashTimer = 0.08;
                if (d.userData.hp <= 0) enemyDeath(d);
                break;
            }
        }
        if (!p.userData.active) continue;

        for (const t of turrets) {
            if (!t.userData.active) continue;
            if (p.position.distanceTo(t.position) < COMBAT.TURRET_HITBOX + 0.3) {
                p.userData.active = false;
                p.visible = false;
                t.userData.hp--;
                t.userData.flashTimer = 0.08;
                if (t.userData.hp <= 0) enemyDeath(t);
                break;
            }
        }
    }

    // Enemy projectiles vs player
    const isInvuln = playerInvulnTimer > 0 || barrelRoll.active;
    for (const p of enemyProjectiles) {
        if (!p.userData.active) continue;
        if (p.position.distanceTo(shipGroup.position) < COMBAT.PLAYER_HITBOX + 0.5) {
            p.userData.active = false;
            p.visible = false;
            spawnFragments(p.position, 0xE63988, 3);
            if (!isInvuln) damagePlayer();
        }
    }
}

// ============================================================
// COMBAT - PLAYER DAMAGE
// ============================================================
function damagePlayer() {
    if (playerHP <= 0) return;
    playerHP--;
    playerInvulnTimer = COMBAT.INVULN_TIME;
    playerDamageFlashTimer = 0.2;
    cameraShakeTimer = 0.3;
    cameraShakeIntensity = 0.5;

    document.getElementById('hp-display').textContent = 'HP: ' + playerHP;

    // Flash screen
    const flash = document.getElementById('damage-flash');
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 200);

    // Flash ship red
    shipGroup.traverse(child => {
        if (child.isMesh && child.material && child.material.color) {
            child.material.color.setHex(0xE63988);
        }
    });

    if (playerHP <= 0) {
        gameState = 'GAMEOVER';
        document.getElementById('game-over').style.display = 'flex';
    }
}

function updateDamageEffects(dt) {
    // Invulnerability timer
    if (playerInvulnTimer > 0) {
        playerInvulnTimer -= dt;
    }

    // Ship flash restore
    if (playerDamageFlashTimer > 0) {
        playerDamageFlashTimer -= dt;
        if (playerDamageFlashTimer <= 0) {
            // Restore original materials
            for (const entry of shipOriginalMats) {
                entry.mesh.material.color.setHex(entry.color);
            }
        }
    }

    // Camera shake
    if (cameraShakeTimer > 0) {
        cameraShakeTimer -= dt;
        const shakeAmt = cameraShakeIntensity * (cameraShakeTimer / 0.3);
        camera.position.x += (Math.random() - 0.5) * shakeAmt;
        camera.position.y += (Math.random() - 0.5) * shakeAmt;
    }
}

// ============================================================
// COMBAT - SHARD & FRAGMENT UPDATES
// ============================================================
function updateShards(dt) {
    for (const s of shards) {
        if (!s.userData.active) continue;

        // Bob animation
        s.userData.age += dt;
        s.position.y += Math.sin(s.userData.age * 3) * dt * 0.5;
        s.rotation.y += dt * 2;

        // Auto-collect
        if (s.position.distanceTo(shipGroup.position) < COMBAT.SHARD_COLLECT_RADIUS) {
            s.userData.active = false;
            s.visible = false;
            shardCount++;
            score += 10;
            document.getElementById('score').textContent = score;
            document.getElementById('shard-count').textContent = shardCount + ' SHARDS';
            // Small amber burst
            spawnFragments(s.position, COLORS.CURRENCY, 4);
        }

        // Despawn if too far
        if (s.position.distanceTo(shipGroup.position) > 150) {
            s.userData.active = false;
            s.visible = false;
        }
    }
}

function updateFragments(dt) {
    for (const f of fragments) {
        if (!f.userData.active) continue;
        f.userData.life += dt;
        f.position.addScaledVector(f.userData.velocity, dt);
        f.userData.velocity.y -= dt * 10; // gravity
        f.material.opacity = 1 - (f.userData.life / f.userData.maxLife);
        f.rotation.x += dt * 5;
        f.rotation.z += dt * 3;
        if (f.userData.life >= f.userData.maxLife) {
            f.userData.active = false;
            f.visible = false;
        }
    }
}

// ============================================================
// COMBAT - CROSSHAIR & AIMING
// ============================================================
function updateCrosshair() {
    const crosshairEl = document.getElementById('crosshair');
    const mx = (input.mouseNormX + 1) * 0.5 * window.innerWidth;
    const my = (1 - (input.mouseNormY + 1) * 0.5) * window.innerHeight;
    crosshairEl.style.left = mx + 'px';
    crosshairEl.style.top = my + 'px';

    // Update aim NDC
    aimNDC.set(input.mouseNormX, input.mouseNormY);

    // Check if aiming at any enemy
    aimRaycaster.setFromCamera(aimNDC, camera);
    let hostile = false;
    for (const d of drones) {
        if (!d.userData.active) continue;
        const sphere = new THREE.Sphere(d.position, COMBAT.DRONE_HITBOX);
        if (aimRaycaster.ray.intersectsSphere(sphere, new THREE.Vector3())) {
            hostile = true;
            break;
        }
    }
    if (!hostile) {
        for (const t of turrets) {
            if (!t.userData.active) continue;
            const sphere = new THREE.Sphere(t.position, COMBAT.TURRET_HITBOX);
            if (aimRaycaster.ray.intersectsSphere(sphere, new THREE.Vector3())) {
                hostile = true;
                break;
            }
        }
    }
    crosshairEl.className = hostile ? 'hostile' : '';
}

// ============================================================
// COMBAT - MASTER UPDATE
// ============================================================
function updateCombat(dt) {
    // Fire
    const shouldFire = isFireHeld || (input.gamepadIndex >= 0 && navigator.getGamepads()[input.gamepadIndex] &&
        (navigator.getGamepads()[input.gamepadIndex].buttons[7]?.pressed ||
         navigator.getGamepads()[input.gamepadIndex].buttons[0]?.pressed));

    if (shouldFire) {
        fireTimer += dt;
        if (fireTimer >= 1 / COMBAT.FIRE_RATE) {
            fireTimer = 0;
            fireProjectile();
        }
    } else {
        fireTimer = 1 / COMBAT.FIRE_RATE; // Ready to fire immediately on next press
    }

    processSpawns();
    updateDrones(dt);
    updateTurrets(dt);
    updatePlayerProjectiles(dt);
    updateEnemyProjectiles(dt);
    checkCollisions();
    updateDamageEffects(dt);
    updateShards(dt);
    updateFragments(dt);
    updateCrosshair();
}

// ============================================================
// DEBUG TOGGLE
// ============================================================
window.addEventListener('keydown', (e) => {
    if (e.code === 'KeyL' && debugLine) {
        debugVisible = !debugVisible;
        debugLine.visible = debugVisible;
    }
});

// ============================================================
// GAME LOOP
// ============================================================
function animate() {
    requestAnimationFrame(animate);

    let dt = clock.getDelta();
    if (dt > 0.05) dt = 0.05; // Clamp to prevent spiral

    elapsedTime += dt;

    if (gameState === 'PLAYING') {
        processInput(dt);
        updateShip(dt);
        updateCamera(dt);
        updateSpeedLines(dt);
        updateCombat(dt);
        updateArchCulling();
    }

    renderer.render(scene, camera);
}

// ============================================================
// INIT & START
// ============================================================
function init() {
    initRenderer();
    initScene();
    createSkybox();
    createGround();
    createSplinePath();
    createShip();
    createSpeedLines();
    initLighting();
    buildArchitecture();
    initCombat();
    initInput();

    window.addEventListener('resize', onResize);

    // Position camera initially
    const startPoint = splineCurve.getPointAt(0);
    camera.position.copy(startPoint).add(new THREE.Vector3(0, CAM.ABOVE, CAM.BEHIND));
    camera.lookAt(startPoint);

    animate();
}

init();
</script>
