function getFormationOffsets(formation, count) {
    const offsets = [];
    const spacing = 3;
    if (formation === 'v') {
        for (let i = 0; i < count; i++) {
            const row = Math.floor(i / 2);
            const side = i % 2 === 0 ? -1 : 1;
            if (i === 0) offsets.push({ x: 0, y: 0 });
            else offsets.push({ x: side * row * spacing, y: -row * spacing * 0.5 });
        }
    } else if (formation === 'line') {
        const half = (count - 1) / 2;
        for (let i = 0; i < count; i++) offsets.push({ x: (i - half) * spacing, y: 0 });
    } else if (formation === 'diamond') {
        offsets.push({ x: 0, y: spacing });
        offsets.push({ x: -spacing, y: 0 });
        offsets.push({ x: spacing, y: 0 });
        offsets.push({ x: 0, y: -spacing });
        for (let i = 4; i < count; i++) offsets.push({ x: (Math.random() - 0.5) * spacing * 2, y: (Math.random() - 0.5) * spacing * 2 });
    }
    return offsets;
}

function spawnDrone(pos) {
    for (const d of drones) {
        if (!d.userData.active) {
            d.userData.active = true;
            d.userData.hp = COMBAT.DRONE_HP;
            d.userData.flashTimer = 0;
            d.userData.basePos.copy(pos);
            d.userData.phase = Math.random() * Math.PI * 2;
            d.position.copy(pos);
            d.visible = true;
            d.material.color.setHex(0xE63988);
            d.material.emissiveIntensity = 0.3;
            d.scale.set(1, 1, 1);
            return d;
        }
    }
    return null;
}

function spawnTurret(pos) {
    for (const t of turrets) {
        if (!t.userData.active) {
            t.userData.active = true;
            t.userData.hp = COMBAT.TURRET_HP;
            t.userData.fireTimer = 1.5 + Math.random();
            t.userData.charging = false;
            t.userData.chargeTimer = 0;
            t.userData.flashTimer = 0;
            t.position.copy(pos);
            t.visible = true;
            // Reset body color
            t.children[0].material.color.setHex(COLORS.DUSTY_BLUE);
            t.scale.set(1, 1, 1);
            return t;
        }
    }
    return null;
}

function processSpawns() {
    for (let i = 0; i < spawnEvents.length; i++) {
        if (triggeredSpawns.has(i)) continue;
        const ev = spawnEvents[i];
        if (splineProgress >= ev.t) {
            triggeredSpawns.add(i);
            const frame = getSplineFrame(Math.min(ev.t + 0.02, 0.999));

            if (ev.type === 'drone') {
                const offsets = getFormationOffsets(ev.formation, ev.count);
                let baseOffset = new THREE.Vector3();
                if (ev.side === 'left') baseOffset.copy(frame.right).multiplyScalar(-15);
                else if (ev.side === 'right') baseOffset.copy(frame.right).multiplyScalar(15);
                else baseOffset.copy(frame.tan).multiplyScalar(30);
                // Position ahead of player
                const spawnPos = frame.pos.clone().add(baseOffset).addScaledVector(frame.tan, -40);

                for (const off of offsets) {
                    const pos = spawnPos.clone()
                        .addScaledVector(frame.right, off.x)
                        .addScaledVector(frame.up, off.y + 3);
                    spawnDrone(pos);
                }
            } else if (ev.type === 'turret') {
                const wallDist = 12;
                for (let j = 0; j < ev.count; j++) {
                    const tOff = ev.count > 1 ? (j / (ev.count - 1) - 0.5) * 0.02 : 0;
                    const tFrame = getSplineFrame(Math.min(ev.t + 0.02 + tOff, 0.999));
                    const sides = ev.wallSide === 'both' ? [-1, 1] : [ev.wallSide === 'left' ? -1 : 1];
                    for (const s of sides) {
                        const pos = tFrame.pos.clone()
                            .addScaledVector(tFrame.right, s * wallDist)
                            .addScaledVector(tFrame.tan, -30);
                        pos.y = tFrame.pos.y + 2;
                        spawnTurret(pos);
                    }
                }
            } else if (ev.type === 'formation') {
                spawnFormationGroup(frame, ev);
            } else if (ev.type === 'miniboss') {
                activateMiniboss();
            }
        }
    }
}

function spawnFormationGroup(frame, ev) {
    const offsets = getFormationOffsets(ev.formation, ev.count);
    let baseOffset = new THREE.Vector3();
    if (ev.side === 'left') baseOffset.copy(frame.right).multiplyScalar(-15);
    else if (ev.side === 'right') baseOffset.copy(frame.right).multiplyScalar(15);
    else baseOffset.copy(frame.tan).multiplyScalar(30);
    const spawnPos = frame.pos.clone().add(baseOffset).addScaledVector(frame.tan, -40);

    const group = {
        id: formationGroups.length,
        center: spawnPos.clone(),
        moveDir: frame.tan.clone().negate().multiplyScalar(10),
        scattered: false, scatterTimer: 0,
        members: []
    };

    for (const off of offsets) {
        for (const f of formationFlyers) {
            if (!f.userData.active) {
                f.userData.active = true;
                f.userData.hp = COMBAT.FLYER_HP;
                f.userData.groupId = group.id;
                f.userData.formationOffset.set(off.x, off.y + 3, 0);
                f.userData.scattered = false;
                f.userData.scatterTimer = 0;
                f.userData.flashTimer = 0;
                f.position.copy(spawnPos).addScaledVector(frame.right, off.x).addScaledVector(frame.up, off.y + 3);
                f.visible = true;
                f.material.color.setHex(0x00F0FF);
                f.scale.set(1, 1, 1);
                group.members.push(f);
                break;
            }
        }
    }
    formationGroups.push(group);
}

function scatterFormationGroup(groupId) {
    const group = formationGroups.find(g => g.id === groupId);
    if (!group || group.scattered) return;
    group.scattered = true;
    group.scatterTimer = COMBAT.FLYER_SCATTER_TIME;
    for (const f of group.members) {
        if (f.userData.active) {
            f.userData.scattered = true;
            f.userData.scatterTimer = COMBAT.FLYER_SCATTER_TIME;
            f.userData.scatterDir.set(
                (Math.random() - 0.5) * 25,
                (Math.random() - 0.5) * 15,
                (Math.random() - 0.5) * 25
            );
        }
    }
}

function activateMiniboss() {
    if (bossState.active) return;
    bossState.active = true;
    bossState.hp = COMBAT.BOSS_HP;
    bossState.maxHp = COMBAT.BOSS_HP;
    bossState.phase = 1;
    bossState.dying = false;
    bossState.deathTimer = 0;
    bossState.burstTimer = COMBAT.BOSS_BURST_INTERVAL_P1;
    bossState.droneTimer = COMBAT.BOSS_DRONE_INTERVAL_P1;
    bossState.beamTimer = COMBAT.BOSS_BEAM_INTERVAL;
    bossState.beamActive = false;
    bossState.orbitAngle = 0;
    bossState.thresholds = { t75: false, t50: false, t25: false };

    // Find monolith center from architecture
    const centerT = (SECTIONS.MONOLITH.start + SECTIONS.MONOLITH.end) / 2;
    const centerFrame = getSplineFrame(centerT);
    bossState.orbitCenter.copy(centerFrame.pos);
    bossState.orbitCenter.addScaledVector(centerFrame.right, 35);
    bossState.orbitCenter.y = centerFrame.pos.y + 20;

    // Reset spikes
    for (const spike of bossState.spikes) {
        spike.visible = true;
        spike.position.copy(spike.userData.originalPos);
        spike.quaternion.copy(spike.userData.originalQuat);
        spike.material.opacity = 1;
    }

    boss.visible = true;
    boss.children.find(c => c.name === 'core').material.color.setHex(0x2D2D2D);
    boss.scale.set(1, 1, 1);

    document.getElementById('boss-hp-bar').style.display = 'block';
    updateBossHPBar();
}

function updateBossHPBar() {
    const pct = Math.max(0, bossState.hp / bossState.maxHp) * 100;
    document.getElementById('boss-hp-fill').style.width = pct + '%';
}

// ============================================================
// COMBAT - SHOOTING
// ============================================================
function fireProjectile() {
    for (const p of playerProjectiles) {
        if (!p.userData.active) {
            p.userData.active = true;
            p.userData.traveled = 0;
            p.visible = true;

            // Fire from ship toward aim point
            p.position.copy(shipGroup.position);

            // Get aim direction from camera through crosshair
            aimRaycaster.setFromCamera(aimNDC, camera);
            const dir = aimRaycaster.ray.direction.clone().normalize();
            p.userData.velocity.copy(dir).multiplyScalar(COMBAT.PROJ_SPEED);

            // Orient projectile along velocity
            p.lookAt(p.position.clone().add(dir));
            return;
        }
    }
}

function fireEnemyProjectile(fromPos, targetPos) {
    for (const p of enemyProjectiles) {
        if (!p.userData.active) {
            p.userData.active = true;
            p.userData.traveled = 0;
            p.userData.age = 0;
            p.visible = true;
            p.position.copy(fromPos);
            const dir = new THREE.Vector3().subVectors(targetPos, fromPos).normalize();
            p.userData.velocity.copy(dir).multiplyScalar(COMBAT.ENEMY_PROJ_SPEED);
            return;
        }
    }
}

// ============================================================
// COMBAT - ENEMY UPDATES
// ============================================================
function updateDrones(dt) {
    for (const d of drones) {
        if (!d.userData.active) continue;

        // Rotate
        d.rotation.x += dt * 1.0;
        d.rotation.y += dt * 0.7;

        // Sine-wave drift (halved if slowed)
        const speedMult = d.userData.slowed ? 0.5 : 1.0;
        d.userData.phase += dt * speedMult;
        const driftX = Math.sin(d.userData.phase * 1.2) * 3;
        const driftY = Math.cos(d.userData.phase * 0.8) * 2;
        d.position.x = d.userData.basePos.x + driftX;
        d.position.y = d.userData.basePos.y + driftY;

        // Drift slowly toward player along z
        const toShip = shipGroup.position.z - d.position.z;
        if (Math.abs(toShip) > 5) {
            d.position.z += Math.sign(toShip) * dt * 8;
            d.userData.basePos.z += Math.sign(toShip) * dt * 8;
        }

        // Flash timer
        if (d.userData.flashTimer > 0) {
            d.userData.flashTimer -= dt;
            d.material.color.setHex(d.userData.flashTimer > 0 ? 0xffffff : 0xE63988);
        }

        // Despawn if too far behind player
        if (d.position.distanceTo(shipGroup.position) > 200) {
            d.userData.active = false;
            d.visible = false;
        }
    }
}

function updateTurrets(dt) {
    for (const t of turrets) {
        if (!t.userData.active) continue;

        // Track player
        const eye = t.children.find(c => c.name === 'eye');
        if (eye) {
            const dir = new THREE.Vector3().subVectors(shipGroup.position, t.position).normalize();
            eye.position.copy(dir.multiplyScalar(0.6));
        }

        // Flash timer
        if (t.userData.flashTimer > 0) {
            t.userData.flashTimer -= dt;
            t.children[0].material.color.setHex(t.userData.flashTimer > 0 ? 0xffffff : COLORS.DUSTY_BLUE);
        }

        // Fire logic
        const tSpeedMult = t.userData.slowed ? 0.5 : 1.0;
        t.userData.fireTimer -= dt * tSpeedMult;
        if (t.userData.fireTimer <= 0 && !t.userData.charging) {
            t.userData.charging = true;
            t.userData.chargeTimer = COMBAT.TURRET_CHARGE_TIME;
        }

        if (t.userData.charging) {
            t.userData.chargeTimer -= dt;
            // Pulse eye during charge
            if (eye) {
                const pulse = 1 + Math.sin(t.userData.chargeTimer * 15) * 0.3;
                eye.scale.set(pulse, pulse, pulse);
            }
            if (t.userData.chargeTimer <= 0) {
                // Fire
                t.userData.charging = false;
                t.userData.fireTimer = COMBAT.TURRET_FIRE_INTERVAL;
                if (eye) eye.scale.set(1, 1, 1);
                // Only fire if player is somewhat close
                if (t.position.distanceTo(shipGroup.position) < 100) {
                    fireEnemyProjectile(t.position, shipGroup.position.clone());
                }
            }
        }

        // Despawn if too far behind
        if (t.position.distanceTo(shipGroup.position) > 200) {
            t.userData.active = false;
            t.visible = false;
        }
    }
}

// ============================================================
// COMBAT - PROJECTILE UPDATES
// ============================================================
function updatePlayerProjectiles(dt) {
    for (const p of playerProjectiles) {
        if (!p.userData.active) continue;
        p.position.addScaledVector(p.userData.velocity, dt);
        p.userData.traveled += COMBAT.PROJ_SPEED * dt;
        if (p.userData.traveled > COMBAT.PROJ_MAX_DIST) {
            p.userData.active = false;
            p.visible = false;
        }
    }
}

function updateEnemyProjectiles(dt) {
    for (const p of enemyProjectiles) {
        if (!p.userData.active) continue;
        p.position.addScaledVector(p.userData.velocity, dt);
        p.userData.traveled += COMBAT.ENEMY_PROJ_SPEED * dt;
        p.userData.age += dt;
        if (p.userData.traveled > COMBAT.ENEMY_PROJ_MAX_DIST || p.userData.age > COMBAT.ENEMY_PROJ_MAX_TIME) {
            p.userData.active = false;
            p.visible = false;
        }
    }
}

// ============================================================
// COMBAT - COLLISION DETECTION
// ============================================================
function spawnFragments(pos, color, count) {
    let spawned = 0;
    for (const f of fragments) {
        if (!f.userData.active && spawned < count) {
            f.userData.active = true;
            f.userData.life = 0;
            f.userData.maxLife = 0.4 + Math.random() * 0.3;
            f.position.copy(pos);
            f.material.color.setHex(color);
            f.material.opacity = 1;
            f.visible = true;
            f.scale.set(0.5 + Math.random() * 0.8, 0.5 + Math.random() * 0.8, 0.5 + Math.random() * 0.8);
            f.userData.velocity.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20
            );
            spawned++;
        }
    }
}

function spawnDeathFlash(pos, color) {
    // Use a fragment as a flash sphere
    for (const f of fragments) {
        if (!f.userData.active) {
            f.userData.active = true;
            f.userData.life = 0;
            f.userData.maxLife = 0.25;
            f.position.copy(pos);
            f.material.color.setHex(color);
            f.material.opacity = 1;
            f.visible = true;
            f.scale.set(3, 3, 3);
            f.userData.velocity.set(0, 0, 0);
            return;
        }
    }
}

function spawnShards(pos, count) {
    let spawned = 0;
    for (const s of shards) {
        if (!s.userData.active && spawned < count) {
            s.userData.active = true;
            s.userData.age = Math.random() * Math.PI * 2;
            s.position.copy(pos);
            s.position.x += (Math.random() - 0.5) * 3;
            s.position.y += (Math.random() - 0.5) * 2;
            s.position.z += (Math.random() - 0.5) * 3;
            s.visible = true;
            s.material.opacity = 1;
            spawned++;
        }
    }
}

function enemyDeath(enemy) {
    const pos = enemy.position ? enemy.position.clone() :
        (enemy instanceof THREE.Group ? enemy.position.clone() : new THREE.Vector3());
    const type = enemy.userData.type;

    enemy.userData.active = false;
    enemy.visible = false;

    if (type === 'drone') {
        spawnFragments(pos, 0xE63988, 7);
        spawnDeathFlash(pos, 0xffffff);
        spawnShards(pos, 1);
        score += 100;
    } else if (type === 'turret') {
        spawnFragments(pos, COLORS.DUSTY_BLUE, 5);
        spawnDeathFlash(pos, 0x00F0FF);
        spawnShards(pos, 3);
        score += 250;
    } else if (type === 'flyer') {
        spawnFragments(pos, 0x00F0FF, 3);
        spawnShards(pos, 1);
        score += 150;
    }

    triggerModifierOnKill(enemy, pos);
    document.getElementById('score').textContent = score;
}

function hitEnemy(p, enemy, hitbox) {
    const dmg = p.userData.damage || 1;
    if (!p.userData.piercing) { p.userData.active = false; p.visible = false; }
    enemy.userData.hp -= dmg;
    enemy.userData.flashTimer = 0.08;
    triggerModifierOnHit(enemy, enemy.position ? enemy.position.clone() : new THREE.Vector3());
    if (enemy.userData.hp <= 0) {
        if (enemy.userData.type === 'flyer') {
            scatterFormationGroup(enemy.userData.groupId);
            const grp = formationGroups.find(g => g.id === enemy.userData.groupId);
            if (grp) grp.members = grp.members.filter(m => m !== enemy);
        }
        enemyDeath(enemy);
    }
}

function checkCollisions() {
    // Player projectiles vs enemies
    for (const p of playerProjectiles) {
        if (!p.userData.active) continue;

        for (const d of drones) {
            if (!d.userData.active) continue;
            if (p.position.distanceTo(d.position) < COMBAT.DRONE_HITBOX + 0.3) {
                hitEnemy(p, d, COMBAT.DRONE_HITBOX);
                break;
            }
        }
        if (!p.userData.active && !p.userData.piercing) continue;
        if (!p.userData.active) continue;

        for (const t of turrets) {
            if (!t.userData.active) continue;
            if (p.position.distanceTo(t.position) < COMBAT.TURRET_HITBOX + 0.3) {
                hitEnemy(p, t, COMBAT.TURRET_HITBOX);
                break;
            }
        }
        if (!p.userData.active) continue;

        for (const f of formationFlyers) {
            if (!f.userData.active) continue;
            if (p.position.distanceTo(f.position) < COMBAT.FLYER_HITBOX + 0.3) {
                hitEnemy(p, f, COMBAT.FLYER_HITBOX);
                break;
            }
        }
        if (!p.userData.active) continue;

        // vs miniboss
        if (bossState.active && !bossState.dying) {
            if (p.position.distanceTo(boss.position) < COMBAT.BOSS_HITBOX + 0.3) {
                if (!p.userData.piercing) { p.userData.active = false; p.visible = false; }
                damageBoss(p.userData.damage || 1);
            }
        }
    }

    // Enemy projectiles vs player
    const isInvuln = playerInvulnTimer > 0 || barrelRoll.active;
    for (const p of enemyProjectiles) {
        if (!p.userData.active) continue;
        if (p.position.distanceTo(shipGroup.position) < COMBAT.PLAYER_HITBOX + 0.5) {
            // Reflector shield: during barrel roll, reflect projectiles
            if (barrelRoll.active && weaponState.buffs.includes('reflector')) {
                p.userData.velocity.negate();
                p.userData.damage = 2;
                p.userData.reflected = true;
                // Turn gold and add to player projectiles logically
                // Just reverse and let it hit enemies naturally
                spawnFragments(p.position, 0xFFD166, 2); // flash
                continue;
            }
            p.userData.active = false;
            p.visible = false;
            spawnFragments(p.position, 0xE63988, 3);
            if (!isInvuln) damagePlayer();
        }
    }

    // Reflected enemy projectiles vs enemies
    for (const p of enemyProjectiles) {
        if (!p.userData.active || !p.userData.reflected) continue;
        const allEn = [...drones, ...turrets, ...formationFlyers];
        for (const e of allEn) {
            if (!e.userData.active) continue;
            const hitbox = e.userData.hitbox || 1.2;
            if (p.position.distanceTo(e.position) < hitbox + 0.5) {
                p.userData.active = false;
                p.visible = false;
                e.userData.hp -= (p.userData.damage || 2);
                e.userData.flashTimer = 0.08;
                if (e.userData.hp <= 0) enemyDeath(e);
                break;
            }
        }
        if (!p.userData.active) continue;
        if (bossState.active && !bossState.dying && p.position.distanceTo(boss.position) < COMBAT.BOSS_HITBOX + 0.5) {
            p.userData.active = false;
            p.visible = false;
            damageBoss(p.userData.damage || 2);
        }
    }
}

// ============================================================
// COMBAT - PLAYER DAMAGE
// ============================================================
function damagePlayer() {
    if (playerHP <= 0) return;
    playerHP--;
    playerInvulnTimer = COMBAT.INVULN_TIME;
    playerDamageFlashTimer = 0.2;
    cameraShakeTimer = 0.3;
    cameraShakeIntensity = 0.5;

    document.getElementById('hp-display').textContent = 'HP: ' + playerHP;

    // Flash screen
    const flash = document.getElementById('damage-flash');
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 200);

    // Flash ship red
    shipGroup.traverse(child => {
        if (child.isMesh && child.material && child.material.color) {
            child.material.color.setHex(0xE63988);
        }
    });

    if (playerHP <= 0) {
        gameState = 'GAMEOVER';
        document.getElementById('game-over').style.display = 'flex';
    }
}

function updateDamageEffects(dt) {
    // Invulnerability timer
    if (playerInvulnTimer > 0) {
        playerInvulnTimer -= dt;
    }

    // Ship flash restore
    if (playerDamageFlashTimer > 0) {
        playerDamageFlashTimer -= dt;
        if (playerDamageFlashTimer <= 0) {
            // Restore original materials
            for (const entry of shipOriginalMats) {
                entry.mesh.material.color.setHex(entry.color);
            }
        }
    }

    // Camera shake
    if (cameraShakeTimer > 0) {
        cameraShakeTimer -= dt;
        const shakeAmt = cameraShakeIntensity * (cameraShakeTimer / 0.3);
        camera.position.x += (Math.random() - 0.5) * shakeAmt;
        camera.position.y += (Math.random() - 0.5) * shakeAmt;
    }
}

// ============================================================
// COMBAT - SHARD & FRAGMENT UPDATES
// ============================================================
function updateShards(dt) {
    for (const s of shards) {
        if (!s.userData.active) continue;

        // Bob animation
        s.userData.age += dt;
        s.position.y += Math.sin(s.userData.age * 3) * dt * 0.5;
        s.rotation.y += dt * 2;

        // Auto-collect
        if (s.position.distanceTo(shipGroup.position) < COMBAT.SHARD_COLLECT_RADIUS) {
            s.userData.active = false;
            s.visible = false;
            shardCount++;
            score += 10;
            document.getElementById('score').textContent = score;
            document.getElementById('shard-count').textContent = shardCount + ' SHARDS';
            // Small amber burst
            spawnFragments(s.position, COLORS.CURRENCY, 4);
        }

        // Despawn if too far
        if (s.position.distanceTo(shipGroup.position) > 150) {
            s.userData.active = false;
            s.visible = false;
        }
    }
}

function updateFragments(dt) {
    for (const f of fragments) {
        if (!f.userData.active) continue;
        f.userData.life += dt;
        f.position.addScaledVector(f.userData.velocity, dt);
        f.userData.velocity.y -= dt * 10; // gravity
        f.material.opacity = 1 - (f.userData.life / f.userData.maxLife);
        f.rotation.x += dt * 5;
        f.rotation.z += dt * 3;
        if (f.userData.life >= f.userData.maxLife) {
            f.userData.active = false;
            f.visible = false;
        }
    }
}

// ============================================================
// COMBAT - FORMATION FLYER UPDATES
// ============================================================
function updateFormationFlyers(dt) {
    // Update group centers
    for (const group of formationGroups) {
        if (group.scattered) {
            group.scatterTimer -= dt;
            if (group.scatterTimer <= 0) group.scattered = false;
        }
        // Move group center toward player
        const toShip = new THREE.Vector3().subVectors(shipGroup.position, group.center);
        if (toShip.length() > 5) {
            group.center.addScaledVector(toShip.normalize(), dt * 8);
        }
    }

    for (const f of formationFlyers) {
        if (!f.userData.active) continue;

        f.rotation.x += dt * 1.5;
        f.rotation.y += dt * 1.2;

        const group = formationGroups.find(g => g.id === f.userData.groupId);
        if (!group) continue;

        if (f.userData.scattered && f.userData.scatterTimer > 0) {
            // Scatter: fly in random direction
            f.userData.scatterTimer -= dt;
            f.position.addScaledVector(f.userData.scatterDir, dt);
            if (f.userData.scatterTimer <= 0) {
                f.userData.scattered = false;
            }
        } else {
            // Formation: move toward formation position
            const targetPos = group.center.clone().add(f.userData.formationOffset);
            f.position.lerp(targetPos, 0.05);
        }

        if (f.userData.flashTimer > 0) {
            f.userData.flashTimer -= dt;
            f.material.color.setHex(f.userData.flashTimer > 0 ? 0xffffff : 0x00F0FF);
        }

        if (f.position.distanceTo(shipGroup.position) > 200) {
            f.userData.active = false;
            f.visible = false;
        }
    }
}

// ============================================================
// COMBAT - MINIBOSS UPDATE
// ============================================================
function updateMiniboss(dt) {
    if (!bossState.active) return;

    if (bossState.dying) {
        updateBossDeathSequence(dt);
        return;
    }

    // Orbit
    bossState.orbitAngle += COMBAT.BOSS_ORBIT_SPEED * dt;
    boss.position.set(
        bossState.orbitCenter.x + Math.cos(bossState.orbitAngle) * COMBAT.BOSS_ORBIT_RADIUS,
        bossState.orbitCenter.y + Math.sin(bossState.orbitAngle * 0.5) * 8,
        bossState.orbitCenter.z + Math.sin(bossState.orbitAngle) * COMBAT.BOSS_ORBIT_RADIUS
    );

    // Face player
    boss.lookAt(shipGroup.position);

    // Pulse spike emissive
    const pulse = 0.3 + Math.sin(elapsedTime * Math.PI) * 0.3;
    for (const spike of bossState.spikes) {
        if (spike.visible) spike.material.emissiveIntensity = pulse;
    }

    const inPhase2 = bossState.phase === 2;

    // Radial burst attack
    bossState.burstTimer -= dt;
    if (bossState.burstTimer <= 0) {
        bossState.burstTimer = inPhase2 ? COMBAT.BOSS_BURST_INTERVAL_P2 : COMBAT.BOSS_BURST_INTERVAL_P1;
        fireBossRadialBurst();
    }

    // Drone spawning
    bossState.droneTimer -= dt;
    if (bossState.droneTimer <= 0) {
        bossState.droneTimer = inPhase2 ? COMBAT.BOSS_DRONE_INTERVAL_P2 : COMBAT.BOSS_DRONE_INTERVAL_P1;
        const droneCount = inPhase2 ? 4 : 2;
        for (let i = 0; i < droneCount; i++) {
            const pos = boss.position.clone().add(new THREE.Vector3(
                (Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6
            ));
            spawnDrone(pos);
        }
    }

    // Phase 2: sweeping beam
    if (inPhase2) {
        if (!bossState.beamActive) {
            bossState.beamTimer -= dt;
            if (bossState.beamTimer <= 0) {
                bossState.beamActive = true;
                bossState.beamAngle = 0;
                bossState.beamMesh.visible = true;
            }
        } else {
            bossState.beamAngle += (Math.PI * 2 / COMBAT.BOSS_BEAM_DURATION) * dt;
            bossState.beamMesh.position.set(0, 0, -COMBAT.BOSS_BEAM_LENGTH / 2);
            bossState.beamMesh.rotation.set(0, bossState.beamAngle, 0);

            // Check beam collision - approximate with spheres along length
            for (let d = 3; d < COMBAT.BOSS_BEAM_LENGTH; d += 5) {
                const beamWorldPos = new THREE.Vector3(0, 0, -d);
                beamWorldPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), bossState.beamAngle);
                beamWorldPos.add(boss.position);
                if (beamWorldPos.distanceTo(shipGroup.position) < 2.5) {
                    if (playerInvulnTimer <= 0 && !barrelRoll.active) {
                        damagePlayer();
                    }
                    break;
                }
            }

            if (bossState.beamAngle >= Math.PI * 2) {
                bossState.beamActive = false;
                bossState.beamMesh.visible = false;
                bossState.beamTimer = COMBAT.BOSS_BEAM_INTERVAL;
            }
        }
    }
}

function fireBossRadialBurst() {
    const toPlayer = new THREE.Vector3().subVectors(shipGroup.position, boss.position).normalize();
    const right = new THREE.Vector3().crossVectors(toPlayer, _worldUp).normalize();
    const up = new THREE.Vector3().crossVectors(right, toPlayer).normalize();

    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const dir = new THREE.Vector3()
            .addScaledVector(right, Math.cos(angle))
            .addScaledVector(up, Math.sin(angle))
            .addScaledVector(toPlayer, 0.5)
            .normalize();
        const targetPos = boss.position.clone().add(dir.multiplyScalar(100));
        fireEnemyProjectile(boss.position.clone(), targetPos);
    }
}

function damageBoss(amount) {
    if (bossState.dying) return;
    bossState.hp -= amount;
    updateBossHPBar();

    // Flash core white
    const core = boss.children.find(c => c.name === 'core');
    if (core) {
        core.material.color.setHex(0xffffff);
        setTimeout(() => { if (core) core.material.color.setHex(0x2D2D2D); }, 80);
    }

    // HP thresholds
    const pct = bossState.hp / bossState.maxHp;
    if (pct <= 0.75 && !bossState.thresholds.t75) {
        bossState.thresholds.t75 = true;
        detachMonolithPanels(3);
        spawnShards(boss.position, 5);
    }
    if (pct <= 0.50 && !bossState.thresholds.t50) {
        bossState.thresholds.t50 = true;
        bossState.phase = 2;
        detachMonolithPanels(3);
        spawnShards(boss.position, 5);
    }
    if (pct <= 0.25 && !bossState.thresholds.t25) {
        bossState.thresholds.t25 = true;
        detachMonolithPanels(3);
        spawnShards(boss.position, 5);
    }

    if (bossState.hp <= 0) {
        bossState.hp = 0;
        bossState.dying = true;
        bossState.deathTimer = 0;
        bossState.beamMesh.visible = false;
        bossState.beamActive = false;
        score += 2000;
        document.getElementById('score').textContent = score;
    }
}

function detachMonolithPanels(count) {
    let detached = 0;
    for (const gp of bossState.glowPanels) {
        if (detached >= count) break;
        const panel = gp.userData.facadePanel;
        if (!panel || !panel.visible) continue;
        // Detach panel - give it velocity
        panel.userData.detaching = true;
        panel.userData.detachVel = new THREE.Vector3(
            (Math.random() - 0.5) * 15,
            Math.random() * 10,
            (Math.random() - 0.5) * 15
        );
        panel.userData.detachLife = 0;
        // Reveal glow behind it
        gp.visible = true;
        detached++;
    }
}

function updateDetachingPanels(dt) {
    archGroup.traverse(child => {
        if (child.userData.detaching) {
            child.userData.detachLife += dt;
            child.position.addScaledVector(child.userData.detachVel, dt);
            child.userData.detachVel.y -= dt * 8;
            child.rotation.x += dt * 2;
            child.rotation.z += dt * 1.5;
            if (child.userData.detachLife > 1.5) {
                child.visible = false;
                child.userData.detaching = false;
            }
        }
    });
}

function updateBossDeathSequence(dt) {
    bossState.deathTimer += dt;
    const t = bossState.deathTimer;

    // t=0: Spikes fly off
    if (t < 0.05) {
        for (const spike of bossState.spikes) {
            if (spike.visible && !spike.userData.flyingOff) {
                spike.userData.flyingOff = true;
                spike.userData.flyVel = spike.userData.dir.clone().multiplyScalar(15 + Math.random() * 10);
                spike.userData.flyVel.y += Math.random() * 5;
            }
        }
    }

    // Animate flying spikes
    for (const spike of bossState.spikes) {
        if (spike.userData.flyingOff && spike.visible) {
            spike.position.addScaledVector(spike.userData.flyVel, dt);
            spike.rotation.x += dt * 8;
            spike.rotation.z += dt * 6;
            spike.material.opacity = Math.max(0, 1 - t);
            spike.material.transparent = true;
            if (t > 1.0) spike.visible = false;
        }
    }

    // t=0.3: Core flashes white, pulse
    const core = boss.children.find(c => c.name === 'core');
    if (t >= 0.3 && t < 0.8 && core) {
        core.material.color.setHex(0xffffff);
        core.material.emissive = new THREE.Color(0xffffff);
        core.material.emissiveIntensity = 0.5;
        const pulseT = (t - 0.3) / 0.5;
        const pulseScale = 1 + Math.sin(pulseT * Math.PI * 6) * 0.3;
        core.scale.set(pulseScale, pulseScale, pulseScale);
    }

    // t=0.8: Implode
    if (t >= 0.8 && t < 1.0 && core) {
        const implodeT = (t - 0.8) / 0.2;
        const s = Math.max(0.01, 1 - implodeT);
        core.scale.set(s, s, s);
    }

    // t=1.0: Explosion
    if (t >= 1.0 && t < 1.1) {
        if (core) core.visible = false;
        spawnFragments(boss.position, 0xE63988, 10);
        spawnFragments(boss.position, 0x00F0FF, 10);
        spawnFragments(boss.position, 0xffffff, 10);
        spawnShards(boss.position, 10);

        // Screen flash
        const flash = document.getElementById('boss-death-flash');
        flash.style.opacity = '0.8';
        setTimeout(() => { flash.style.transition = 'opacity 0.5s'; flash.style.opacity = '0'; }, 50);
    }

    // t=1.5: Kill boss-spawned drones
    if (t >= 1.5 && t < 1.6) {
        for (const d of drones) {
            if (d.userData.active) {
                enemyDeath(d);
            }
        }
    }

    // t=2.0: Done
    if (t >= 2.0) {
        bossState.active = false;
        bossState.dying = false;
        boss.visible = false;
        bossDefeated = true;
        document.getElementById('boss-hp-bar').style.display = 'none';
    }
}

// ============================================================
// SET PIECES
// ============================================================
function updateSetPieces(dt) {
    // Closing walls (Section 1, t ~0.12)
    if (!closingWallsTriggered && splineProgress >= 0.12) {
        closingWallsTriggered = true;
        closingWallsTimer = 0;
    }
    if (closingWallsTriggered && closingWallsTimer < 5) {
        closingWallsTimer += dt;
        const t = Math.min(closingWallsTimer / 5, 1);
        // Smoothstep ease
        const eased = t * t * (3 - 2 * t);
        for (const slab of closingWallSlabs) {
            const openOff = slab.userData.openOffset;
            const closedOff = slab.userData.closedOffset;
            const currentOff = openOff + (closedOff - openOff) * eased;
            slab.position.copy(slab.userData.basePos);
            slab.position.addScaledVector(slab.userData.rightVec, currentOff);
            slab.position.y = -18 + 27.5;
        }
    }

    // Crumbling bridge (Section 2, t ~0.53)
    if (!bridgeCrumbleTriggered && splineProgress >= 0.53) {
        bridgeCrumbleTriggered = true;
        triggerBridgeCrumble();
    }
    if (bridgeFragments.length > 0) {
        for (const bf of bridgeFragments) {
            if (!bf.userData.active) continue;
            bf.userData.age += dt;
            bf.position.addScaledVector(bf.userData.velocity, dt);
            bf.userData.velocity.y -= dt * 20; // gravity
            bf.rotation.x += bf.userData.rotVel.x * dt;
            bf.rotation.y += bf.userData.rotVel.y * dt;
            bf.rotation.z += bf.userData.rotVel.z * dt;

            // Dangerous for first 1 second
            if (bf.userData.age < 1.0 && bf.userData.age > 0.1) {
                if (bf.position.distanceTo(shipGroup.position) < 2.5) {
                    if (playerInvulnTimer <= 0 && !barrelRoll.active) {
                        damagePlayer();
                    }
                }
            }

            // Fade after 1.5s, remove at 2s
            if (bf.userData.age > 1.5) {
                bf.material.opacity = Math.max(0, 1 - (bf.userData.age - 1.5) / 0.5);
            }
            if (bf.userData.age > 2.0) {
                bf.userData.active = false;
                bf.visible = false;
            }
        }
    }

    // Detaching panels
    updateDetachingPanels(dt);
}

function triggerBridgeCrumble() {
    // Find bridge
    let bridgeMesh = null;
    archGroup.traverse(child => {
        if (child.userData.isBridge) bridgeMesh = child;
    });
    if (!bridgeMesh) return;

    const bridgePos = bridgeMesh.position.clone();
    const bridgeW = 35, bridgeH = 3, bridgeD = 10;
    bridgeMesh.visible = false;

    // Create fragments
    const cols = 4, rows = 3;
    const fragW = bridgeW / cols, fragH = bridgeH, fragD = bridgeD / rows;
    for (let c = 0; c < cols; c++) {
        for (let r = 0; r < rows; r++) {
            const geo = new THREE.BoxGeometry(fragW * (0.7 + Math.random() * 0.3), fragH, fragD * (0.7 + Math.random() * 0.3));
            const mat = new THREE.MeshLambertMaterial({ color: COLORS.COOL_CONCRETE, flatShading: true, transparent: true });
            const frag = new THREE.Mesh(geo, mat);
            frag.position.copy(bridgePos);
            frag.position.x += (c - cols / 2 + 0.5) * fragW;
            frag.position.z += (r - rows / 2 + 0.5) * fragD;
            frag.userData = {
                active: true, age: Math.random() * 0.3,
                velocity: new THREE.Vector3((Math.random() - 0.5) * 5, -15 - Math.random() * 10, (Math.random() - 0.5) * 5),
                rotVel: new THREE.Vector3((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3)
            };
            frag.castShadow = true;
            scene.add(frag);
            bridgeFragments.push(frag);
        }
    }
}

// ============================================================
// END OF LEVEL
// ============================================================
function updateEndOfLevel(dt) {
    if (levelEnding) {
        levelEndTimer += dt;
        // Increase fog to white-out
        const fogT = Math.min(levelEndTimer / 2, 1);
        scene.fog.near = 80 - fogT * 70;
        scene.fog.far = 450 - fogT * 400;
        scene.fog.color.lerp(new THREE.Color(0xffffff), fogT * 0.02);

        if (levelEndTimer > 2 && !document.getElementById('run-complete')) {
            const div = document.createElement('div');
            div.id = 'run-complete';
            div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-family:Courier New,monospace;font-size:32px;letter-spacing:6px;z-index:20;opacity:0;transition:opacity 1s;';
            div.textContent = 'RUN COMPLETE';
            document.body.appendChild(div);
            setTimeout(() => div.style.opacity = '1', 50);
        }
        return;
    }

    if (splineProgress >= 0.95) {
        if (bossDefeated || !bossState.active) {
            levelEnding = true;
            levelEndTimer = 0;
        } else {
            // Boss still alive - slow down and hold position
            splineProgress = Math.min(splineProgress, 0.96);
        }
    }
}

// ============================================================
// COMBAT - CROSSHAIR & AIMING
// ============================================================
function updateCrosshair() {
    const crosshairEl = document.getElementById('crosshair');
    const mx = (input.mouseNormX + 1) * 0.5 * window.innerWidth;
    const my = (1 - (input.mouseNormY + 1) * 0.5) * window.innerHeight;
    crosshairEl.style.left = mx + 'px';
    crosshairEl.style.top = my + 'px';

    // Update aim NDC
    aimNDC.set(input.mouseNormX, input.mouseNormY);

    // Check if aiming at any enemy
    aimRaycaster.setFromCamera(aimNDC, camera);
    let hostile = false;
    for (const d of drones) {
        if (!d.userData.active) continue;
        const sphere = new THREE.Sphere(d.position, COMBAT.DRONE_HITBOX);
        if (aimRaycaster.ray.intersectsSphere(sphere, new THREE.Vector3())) {
            hostile = true;
            break;
        }
    }
    if (!hostile) {
        for (const t of turrets) {
            if (!t.userData.active) continue;
            const sphere = new THREE.Sphere(t.position, COMBAT.TURRET_HITBOX);
            if (aimRaycaster.ray.intersectsSphere(sphere, new THREE.Vector3())) {
                hostile = true;
                break;
            }
        }
    }
    if (!hostile) {
        for (const f of formationFlyers) {
            if (!f.userData.active) continue;
            const sphere = new THREE.Sphere(f.position, COMBAT.FLYER_HITBOX);
            if (aimRaycaster.ray.intersectsSphere(sphere, new THREE.Vector3())) {
                hostile = true;
                break;
            }
        }
    }
    if (!hostile && bossState.active && !bossState.dying) {
        const sphere = new THREE.Sphere(boss.position, COMBAT.BOSS_HITBOX);
        if (aimRaycaster.ray.intersectsSphere(sphere, new THREE.Vector3())) {
            hostile = true;
        }
    }
    crosshairEl.className = hostile ? 'hostile' : '';
}

// ============================================================
// COMBAT - MASTER UPDATE
// ============================================================
function updateCombat(dt) {
    // Fire
    const shouldFire = isFireHeld || (input.gamepadIndex >= 0 && navigator.getGamepads()[input.gamepadIndex] &&
        (navigator.getGamepads()[input.gamepadIndex].buttons[7]?.pressed ||
         navigator.getGamepads()[input.gamepadIndex].buttons[0]?.pressed));

    const rate = getFireRate();
    if (shouldFire) {
        fireTimer += dt;
        if (fireTimer >= 1 / rate) {
            fireTimer = 0;
            fireWeapon();
        }
    } else {
        fireTimer = 1 / rate;
    }

    processSpawns();
    checkCardPickTransitions();
    updateDrones(dt);
    updateTurrets(dt);
    updateFormationFlyers(dt);
    updateMiniboss(dt);
    updatePlayerProjectiles(dt);
    updateEnemyProjectiles(dt);
    checkCollisions();
    updateDamageEffects(dt);
    updateShards(dt);
    updateFragments(dt);
    updateSetPieces(dt);
    updateEndOfLevel(dt);
    updateCardEffects(dt);
    updateVoidZone(dt);
    updateCrosshair();
}

// ============================================================
// ============================================================
// CARD SYSTEM - SHUFFLE & SELECTION
// ============================================================
function shuffleArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function initCardSystem() {
    shuffledFire = shuffleArray(FIRE_PATTERNS);
    shuffledMod = shuffleArray(MODIFIERS);
    shuffledBuff = shuffleArray(SHIP_BUFFS);
    cardPickNumber = 0;
    weaponState.firePattern = 'default';
    weaponState.modifier = null;
    weaponState.buffs = [];

    // Create DOT zone pool
    const dotGeo = new THREE.SphereGeometry(1.5, 6, 4);
    for (let i = 0; i < 8; i++) {
        const z = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: 0xFF8C00, transparent: true, opacity: 0.6 }));
        z.visible = false;
        z.userData = { active: false, life: 0, maxLife: 2 };
        scene.add(z);
        dotZones.push(z);
    }
    // Gravity well pool
    const wellGeo = new THREE.SphereGeometry(2, 8, 6);
    for (let i = 0; i < 4; i++) {
        const w = new THREE.Mesh(wellGeo, new THREE.MeshBasicMaterial({ color: 0x4400AA, transparent: true, opacity: 0.5 }));
        w.visible = false;
        w.userData = { active: false, life: 0, maxLife: 1.5 };
        scene.add(w);
        gravityWells.push(w);
    }
    // Shatter fragment pool
    const sfGeo = new THREE.BoxGeometry(0.12, 0.12, 0.4);
    for (let i = 0; i < 20; i++) {
        const sf = new THREE.Mesh(sfGeo, new THREE.MeshBasicMaterial({ color: COLORS.LASER }));
        sf.visible = false;
        sf.userData = { active: false, velocity: new THREE.Vector3(), life: 0 };
        scene.add(sf);
        shatterFrags.push(sf);
    }
    // Void zone particles
    const vpGeo = new THREE.SphereGeometry(0.08, 4, 2);
    const vpMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
    for (let i = 0; i < VOID_PARTICLE_COUNT; i++) {
        const vp = new THREE.Mesh(vpGeo, vpMat.clone());
        vp.visible = false;
        vp.userData = { vel: new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*1, (Math.random()-0.5)*2) };
        scene.add(vp);
        voidParticles.push(vp);
    }
}

function getCardOffering(pickIndex) {
    return [
        shuffledFire[pickIndex],
        shuffledMod[pickIndex],
        shuffledBuff[pickIndex]
    ];
}

// ============================================================
// CARD SYSTEM - UI
// ============================================================
function showCardPick() {
    cardPickActive = true;
    const overlay = document.getElementById('card-overlay');
    overlay.innerHTML = '';
    overlay.style.display = 'flex';

    const offering = getCardOffering(cardPickNumber);
    offering.forEach((cardId, i) => {
        const card = CARD_DB[cardId];
        const el = document.createElement('div');
        el.className = 'card';
        el.style.borderLeft = `4px solid ${card.color}`;
        el.innerHTML = `
            <div class="card-icon"><svg viewBox="0 0 48 48">${card.icon}</svg></div>
            <div class="card-name">${card.name}</div>
            <div class="card-desc">${card.desc}</div>
            <div class="card-category" style="color:${card.color}">${card.category}</div>
        `;
        el.addEventListener('click', () => selectCard(cardId, i));
        overlay.appendChild(el);
        // Stagger animation
        setTimeout(() => el.classList.add('visible'), 100 + i * 100);
    });
}

function selectCard(cardId, selectedIndex) {
    if (!cardPickActive) return;
    cardPickActive = false;

    const card = CARD_DB[cardId];
    const overlay = document.getElementById('card-overlay');
    const cards = overlay.querySelectorAll('.card');

    cards.forEach((el, i) => {
        if (i === selectedIndex) {
            el.classList.add('selected');
        } else {
            el.classList.add('dismissed');
        }
    });

    // Apply card
    applyCard(cardId, card);
    cardPickNumber++;

    // Dismiss UI after animation
    setTimeout(() => {
        overlay.style.display = 'none';
        exitCardPick();
    }, 800);
}

function applyCard(cardId, card) {
    if (card.category === 'FIRE PATTERN') {
        weaponState.firePattern = cardId;
    } else if (card.category === 'MODIFIER') {
        weaponState.modifier = cardId;
    } else if (card.category === 'SHIP BUFF') {
        weaponState.buffs.push(cardId);
        // Apply immediate buff effects
        if (cardId === 'overclock') {
            FLIGHT.BOOST_MULTIPLIER = 2.0;
            FLIGHT.BOOST_RECHARGE_TIME = 1.5;
        }
        if (cardId === 'magnetic') {
            COMBAT.SHARD_COLLECT_RADIUS = 9;
            // Create visual ring if not yet
            if (!magnetRing) {
                const ringGeo = new THREE.RingGeometry(8.5, 9, 24);
                magnetRing = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: COLORS.CURRENCY, transparent: true, opacity: 0.15, side: THREE.DoubleSide }));
                scene.add(magnetRing);
            }
        }
        if (cardId === 'rear_gunner' && !rearGunnerGroup) {
            rearGunnerGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.6), new THREE.MeshPhongMaterial({ color: COLORS.SHIP_BODY, flatShading: true }));
            const barrel = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.4, 4), new THREE.MeshPhongMaterial({ color: COLORS.SHIP_WING, flatShading: true }));
            barrel.rotation.x = Math.PI / 2;
            barrel.position.z = -0.4;
            rearGunnerGroup.add(body);
            rearGunnerGroup.add(barrel);
            scene.add(rearGunnerGroup);
        }
    }
}

// ============================================================
// CARD SYSTEM - VOID ZONE
// ============================================================
function enterVoidZone() {
    voidZoneActive = true;
    voidZoneTimer = 0;
    savedFogNear = scene.fog.near;
    savedFogFar = scene.fog.far;
}

function exitVoidZone() {
    voidZoneActive = false;
    voidZoneTimer = 0;
}

function updateVoidZone(dt) {
    if (gameState === 'CARD_PICK') {
        voidZoneTimer += dt;
        const t = Math.min(voidZoneTimer / 1, 1);
        scene.fog.near = savedFogNear - t * (savedFogNear - 5);
        scene.fog.far = savedFogFar - t * (savedFogFar - 60);

        // Void particles
        for (const vp of voidParticles) {
            if (!vp.visible) {
                vp.visible = true;
                vp.position.copy(shipGroup.position);
                vp.position.x += (Math.random() - 0.5) * 40;
                vp.position.y += (Math.random() - 0.5) * 20;
                vp.position.z += (Math.random() - 0.5) * 40;
            }
            vp.position.addScaledVector(vp.userData.vel, dt);
            vp.material.opacity = 0.2 + Math.sin(elapsedTime * 2 + vp.position.x) * 0.15;
        }
    } else if (!voidZoneActive && scene.fog.near < 75) {
        // Restore fog
        scene.fog.near += dt * 60;
        scene.fog.far += dt * 300;
        if (scene.fog.near >= savedFogNear) scene.fog.near = savedFogNear;
        if (scene.fog.far >= savedFogFar) scene.fog.far = savedFogFar;
        // Hide particles
        for (const vp of voidParticles) vp.visible = false;
    }
}

function enterCardPick() {
    gameState = 'CARD_PICK';
    enterVoidZone();
    setTimeout(() => showCardPick(), 1000);
}

function exitCardPick() {
    gameState = 'PLAYING';
    exitVoidZone();
    cardTransitionTimer = 1.0; // Speed ramp-up timer
}

// ============================================================
// CARD SYSTEM - WEAPON FIRE (replaces basic fireProjectile)
// ============================================================
function fireWeapon() {
    aimRaycaster.setFromCamera(aimNDC, camera);
    const baseDir = aimRaycaster.ray.direction.clone().normalize();

    const fp = weaponState.firePattern;

    if (fp === 'splitshot') {
        const right = new THREE.Vector3().crossVectors(baseDir, _worldUp).normalize();
        for (const angle of [-0.087, 0, 0.087]) { // ~5 degrees
            const dir = baseDir.clone().addScaledVector(right, Math.tan(angle)).normalize();
            spawnPlayerProj(dir, COMBAT.PROJ_SPEED, 0.7, false);
        }
    } else if (fp === 'piercing') {
        spawnPlayerProj(baseDir, COMBAT.PROJ_SPEED, 1.0, true);
    } else if (fp === 'ricochet') {
        const p = spawnPlayerProj(baseDir, COMBAT.PROJ_SPEED, 1.0, false);
        if (p) p.userData.canBounce = true;
    } else if (fp === 'homing') {
        const p = spawnPlayerProj(baseDir, 60, 1.0, false);
        if (p) p.userData.homing = true;
    } else if (fp === 'rapid') {
        spawnPlayerProj(baseDir, COMBAT.PROJ_SPEED * 1.1, 0.5, false);
    } else if (fp === 'heavy') {
        const p = spawnPlayerProj(baseDir, COMBAT.PROJ_SPEED * 0.8, 3.0, false);
        if (p) { p.userData.damage = 3; p.material.color.setHex(0xFFE080); }
        // Mini screen shake
        cameraShakeTimer = 0.05;
        cameraShakeIntensity = 0.15;
    } else {
        // Default
        spawnPlayerProj(baseDir, COMBAT.PROJ_SPEED, 1.0, false);
    }
}

function spawnPlayerProj(dir, speed, scale, piercing) {
    for (const p of playerProjectiles) {
        if (!p.userData.active) {
            p.userData.active = true;
            p.userData.traveled = 0;
            p.userData.damage = (weaponState.firePattern === 'heavy') ? 3 : 1;
            p.userData.piercing = piercing;
            p.userData.canBounce = false;
            p.userData.homing = false;
            p.visible = true;
            p.position.copy(shipGroup.position);
            p.userData.velocity.copy(dir).multiplyScalar(speed);
            p.lookAt(p.position.clone().add(dir));
            p.scale.set(scale, scale, scale);
            p.material.color.setHex(COLORS.LASER);
            return p;
        }
    }
    return null;
}

function getFireRate() {
    const fp = weaponState.firePattern;
    if (fp === 'rapid') return COMBAT.FIRE_RATE * 2;
    if (fp === 'heavy') return COMBAT.FIRE_RATE / 2;
    return COMBAT.FIRE_RATE;
}

// ============================================================
// CARD SYSTEM - MODIFIER EFFECTS
// ============================================================
function triggerModifierOnHit(enemy, hitPos) {
    const mod = weaponState.modifier;
    if (!mod) return;

    if (mod === 'incendiary') {
        for (const z of dotZones) {
            if (!z.userData.active) {
                z.userData.active = true;
                z.userData.life = 0;
                z.position.copy(hitPos);
                z.visible = true;
                z.material.opacity = 0.6;
                z.scale.set(1, 1, 1);
                break;
            }
        }
    } else if (mod === 'cryo') {
        enemy.userData.slowed = true;
        enemy.userData.slowTimer = 2.0;
        if (enemy.isMesh && enemy.material) {
            enemy.userData.origColor = enemy.material.color.getHex();
            enemy.material.color.setHex(0xA0D2DB);
        } else if (enemy.isGroup && enemy.children[0]) {
            enemy.userData.origColor = enemy.children[0].material.color.getHex();
            enemy.children[0].material.color.setHex(0xA0D2DB);
        }
    } else if (mod === 'chain') {
        // Find nearest other enemy within 8 units
        let nearest = null, nearDist = 8;
        const allEnemies = [...drones, ...turrets, ...formationFlyers];
        for (const e of allEnemies) {
            if (!e.userData.active || e === enemy) continue;
            const ePos = e.position || (e.isGroup ? e.position : null);
            if (!ePos) continue;
            const d = ePos.distanceTo(hitPos);
            if (d < nearDist) { nearDist = d; nearest = e; }
        }
        if (nearest) {
            nearest.userData.hp--;
            nearest.userData.flashTimer = 0.08;
            if (nearest.userData.hp <= 0) enemyDeath(nearest);
            // Brief lightning line visual
            spawnChainLine(hitPos, nearest.position);
        }
    }
}

function triggerModifierOnKill(enemy, deathPos) {
    const mod = weaponState.modifier;
    if (!mod) return;

    if (mod === 'void_collapse') {
        for (const w of gravityWells) {
            if (!w.userData.active) {
                w.userData.active = true;
                w.userData.life = 0;
                w.position.copy(deathPos);
                w.visible = true;
                w.material.opacity = 0.5;
                break;
            }
        }
    } else if (mod === 'shatter') {
        for (let i = 0; i < 4; i++) {
            for (const sf of shatterFrags) {
                if (!sf.userData.active) {
                    sf.userData.active = true;
                    sf.userData.life = 0;
                    sf.position.copy(deathPos);
                    sf.visible = true;
                    sf.userData.velocity.set((Math.random()-0.5)*30, (Math.random()-0.5)*15, (Math.random()-0.5)*30);
                    break;
                }
            }
        }
    }
}

function spawnChainLine(from, to) {
    // Temporary line geometry
    const geo = new THREE.BufferGeometry().setFromPoints([from.clone(), to.clone()]);
    const mat = new THREE.LineBasicMaterial({ color: 0x00F0FF, transparent: true, opacity: 1 });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    setTimeout(() => { scene.remove(line); geo.dispose(); mat.dispose(); }, 150);
}

// ============================================================
// CARD SYSTEM - EFFECT UPDATES
// ============================================================
function updateCardEffects(dt) {
    // DOT zones (incendiary)
    for (const z of dotZones) {
        if (!z.userData.active) continue;
        z.userData.life += dt;
        z.material.opacity = 0.6 * (1 - z.userData.life / z.userData.maxLife);
        z.scale.setScalar(1 + z.userData.life * 0.3);
        // Damage enemies in range
        const allEnemies = [...drones, ...turrets, ...formationFlyers];
        for (const e of allEnemies) {
            if (!e.userData.active) continue;
            if ((e.position || e.position).distanceTo(z.position) < 2) {
                if (!e.userData.dotCooldown || e.userData.dotCooldown <= 0) {
                    e.userData.hp--;
                    e.userData.flashTimer = 0.08;
                    e.userData.dotCooldown = 1.0;
                    if (e.userData.hp <= 0) enemyDeath(e);
                }
            }
        }
        if (z.userData.life >= z.userData.maxLife) { z.userData.active = false; z.visible = false; }
    }

    // DOT cooldown on enemies
    const allEn = [...drones, ...turrets, ...formationFlyers];
    for (const e of allEn) {
        if (e.userData.dotCooldown > 0) e.userData.dotCooldown -= dt;
        // Cryo slow timer
        if (e.userData.slowed) {
            e.userData.slowTimer -= dt;
            if (e.userData.slowTimer <= 0) {
                e.userData.slowed = false;
                if (e.isMesh && e.material && e.userData.origColor !== undefined) {
                    e.material.color.setHex(e.userData.origColor);
                } else if (e.isGroup && e.children[0] && e.userData.origColor !== undefined) {
                    e.children[0].material.color.setHex(e.userData.origColor);
                }
            }
        }
    }

    // Gravity wells (void collapse)
    for (const w of gravityWells) {
        if (!w.userData.active) continue;
        w.userData.life += dt;
        w.material.opacity = 0.5 * (1 - w.userData.life / w.userData.maxLife);
        w.rotation.y += dt * 3;
        // Pull enemies
        for (const e of allEn) {
            if (!e.userData.active) continue;
            const d = (e.position).distanceTo(w.position);
            if (d < 6 && d > 0.5) {
                const pull = new THREE.Vector3().subVectors(w.position, e.position).normalize().multiplyScalar(dt * 5);
                e.position.add(pull);
                if (e.userData.basePos) e.userData.basePos.add(pull);
            }
        }
        if (w.userData.life >= w.userData.maxLife) { w.userData.active = false; w.visible = false; }
    }

    // Shatter fragments
    for (const sf of shatterFrags) {
        if (!sf.userData.active) continue;
        sf.userData.life += dt;
        sf.position.addScaledVector(sf.userData.velocity, dt);
        // Check enemy hits
        for (const e of allEn) {
            if (!e.userData.active) continue;
            if (sf.position.distanceTo(e.position) < (e.userData.hitbox || 1.2) + 0.2) {
                e.userData.hp--;
                e.userData.flashTimer = 0.08;
                if (e.userData.hp <= 0) enemyDeath(e);
                sf.userData.active = false;
                sf.visible = false;
                break;
            }
        }
        if (sf.userData.life > 1.0) { sf.userData.active = false; sf.visible = false; }
    }

    // Homing projectile update
    if (weaponState.firePattern === 'homing') {
        for (const p of playerProjectiles) {
            if (!p.userData.active || !p.userData.homing) continue;
            let nearest = null, nearDist = 20;
            for (const e of allEn) {
                if (!e.userData.active) continue;
                const d = e.position.distanceTo(p.position);
                if (d < nearDist) { nearDist = d; nearest = e; }
            }
            if (nearest) {
                const toTarget = new THREE.Vector3().subVectors(nearest.position, p.position).normalize();
                const currentDir = p.userData.velocity.clone().normalize();
                currentDir.lerp(toTarget, 0.03);
                currentDir.normalize();
                const speed = p.userData.velocity.length();
                p.userData.velocity.copy(currentDir).multiplyScalar(speed);
                p.lookAt(p.position.clone().add(currentDir));
            }
        }
    }

    // Magnetic field visual + drift
    if (weaponState.buffs.includes('magnetic') && magnetRing) {
        magnetRing.position.copy(shipGroup.position);
        magnetRing.rotation.x = -Math.PI / 2;
        magnetRing.visible = true;
        // Shards drift toward player
        for (const s of shards) {
            if (!s.userData.active) continue;
            const d = s.position.distanceTo(shipGroup.position);
            if (d < 9 && d > 0.5) {
                const pull = new THREE.Vector3().subVectors(shipGroup.position, s.position).normalize().multiplyScalar(dt * 10);
                s.position.add(pull);
            }
        }
    }

    // Rear gunner
    if (weaponState.buffs.includes('rear_gunner') && rearGunnerGroup) {
        rearGunnerGroup.position.copy(shipGroup.position);
        rearGunnerGroup.position.addScaledVector(splineCurve.getTangentAt(Math.min(splineProgress, 0.999)), 2);
        rearGunnerGroup.quaternion.copy(shipGroup.quaternion);
        rearGunnerTimer += dt;
        if (rearGunnerTimer >= 1.5) {
            rearGunnerTimer = 0;
            // Find enemy in rear arc
            const shipFwd = splineCurve.getTangentAt(Math.min(splineProgress, 0.999)).negate();
            let target = null, tDist = 40;
            for (const e of allEn) {
                if (!e.userData.active) continue;
                const toE = new THREE.Vector3().subVectors(e.position, shipGroup.position);
                if (toE.dot(shipFwd) > 0) {
                    const d = toE.length();
                    if (d < tDist) { tDist = d; target = e; }
                }
            }
            if (target) {
                const p = spawnPlayerProj(
                    new THREE.Vector3().subVectors(target.position, rearGunnerGroup.position).normalize(),
                    60, 0.4, false
                );
                if (p) p.position.copy(rearGunnerGroup.position);
            }
        }
    }

    // Reflector shield (handled in collision)
    // Phase shift (handled in barrel roll trigger)
}

// ============================================================
// CARD SYSTEM - STATE TRANSITIONS
// ============================================================
function checkCardPickTransitions() {
    // First card pick: t 0.30-0.38
    if (cardPickNumber === 0 && splineProgress >= 0.30 && splineProgress < 0.38 && gameState === 'PLAYING') {
        enterCardPick();
    }
    // Second card pick: t 0.65-0.73
    if (cardPickNumber === 1 && splineProgress >= 0.65 && splineProgress < 0.73 && gameState === 'PLAYING') {
        enterCardPick();
    }
}

// DEBUG TOGGLE
// ============================================================
window.addEventListener('keydown', (e) => {
    if (e.code === 'KeyL' && debugLine) {
        debugVisible = !debugVisible;
        debugLine.visible = debugVisible;
    }
});

// ============================================================
// GAME LOOP
// ============================================================
function animate() {
    requestAnimationFrame(animate);

    let dt = clock.getDelta();
    if (dt > 0.05) dt = 0.05; // Clamp to prevent spiral

    elapsedTime += dt;

    if (gameState === 'PLAYING') {
        processInput(dt);
        updateShip(dt);
        updateCamera(dt);
        updateSpeedLines(dt);
        updateCombat(dt);
        updateArchCulling();
    } else if (gameState === 'CARD_PICK') {
        // Slow drift along spline
        splineProgress += (5 * dt) / splineLength;
        const splinePoint = splineCurve.getPointAt(Math.min(splineProgress, 0.999));
        const tangent = splineCurve.getTangentAt(Math.min(splineProgress, 0.999));
        shipGroup.position.lerp(splinePoint, 0.02);
        updateCamera(dt);
        updateVoidZone(dt);
        updateArchCulling();
    }

    renderer.render(scene, camera);
}

// ============================================================
// INIT & START
// ============================================================
function init() {
    initRenderer();
    initScene();
    createSkybox();
    createGround();
    createSplinePath();
    createShip();
    createSpeedLines();
    initLighting();
    buildArchitecture();
    initCombat();
    initCardSystem();
    initInput();

    window.addEventListener('resize', onResize);

    // Position camera initially
    const startPoint = splineCurve.getPointAt(0);
    camera.position.copy(startPoint).add(new THREE.Vector3(0, CAM.ABOVE, CAM.BEHIND));
    camera.lookAt(startPoint);

    animate();
}

init();
